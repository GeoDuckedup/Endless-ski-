<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#07101b">
<title>ENDLESS POWDER — Recut</title>
<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05080e;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
  #wrap{position:fixed;inset:0;display:grid;place-items:center;
    padding:max(env(safe-area-inset-top),0px) max(env(safe-area-inset-right),0px)
            max(env(safe-area-inset-bottom),0px) max(env(safe-area-inset-left),0px);background:#05080e}
  #stage{position:relative;width:min(100vw,calc(100dvh * 9 / 16));height:min(100dvh,calc(100vw * 16 / 9));
    max-width:100%;max-height:100%;aspect-ratio:9/16;overflow:hidden;background:#cfe0ed;--u:1px}
  #game{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
  .hud{position:absolute;pointer-events:none;color:white;text-shadow:0 calc(2*var(--u)) calc(8*var(--u)) rgba(0,0,0,.45)}
  #depth{top:calc(24*var(--u));left:calc(26*var(--u));font-size:calc(52*var(--u));font-weight:900;letter-spacing:-.035em}
  #depth small{font-size:calc(22*var(--u));font-weight:800;opacity:.72;letter-spacing:.02em}
  #combo{top:calc(24*var(--u));right:calc(26*var(--u));text-align:right;font-size:calc(48*var(--u));font-weight:950;line-height:.9;transform-origin:top right}
  #combo small{display:block;margin-top:calc(7*var(--u));font-size:calc(16*var(--u));font-weight:900;letter-spacing:.16em;opacity:.7}
  #threat{position:absolute;top:calc(92*var(--u));left:50%;transform:translateX(-50%);width:calc(236*var(--u));height:calc(13*var(--u));
    border-radius:999px;background:rgba(5,10,18,.32);border:1px solid rgba(255,255,255,.25);overflow:hidden;pointer-events:none;
    box-shadow:0 calc(2*var(--u)) calc(8*var(--u)) rgba(0,0,0,.2)}
  #threatFill{height:100%;width:0%;border-radius:inherit;background:linear-gradient(90deg,#9fdcff,#ffe0a0,#ff665a);transition:width .08s linear}
  #threatLabel{position:absolute;top:calc(112*var(--u));left:50%;transform:translateX(-50%);font-size:calc(13*var(--u));font-weight:900;letter-spacing:.18em;opacity:.72}
  #fuelWrap{position:absolute;left:50%;bottom:calc(28*var(--u));transform:translateX(-50%);width:calc(290*var(--u));pointer-events:none;text-align:center}
  #fuelLabel{font-size:calc(14*var(--u));font-weight:950;letter-spacing:.2em;color:white;text-shadow:0 calc(2*var(--u)) calc(7*var(--u)) rgba(0,0,0,.5);margin-bottom:calc(8*var(--u))}
  #fuel{height:calc(15*var(--u));border-radius:999px;background:rgba(4,9,16,.42);border:1px solid rgba(255,255,255,.28);padding:calc(2*var(--u));box-shadow:0 calc(3*var(--u)) calc(10*var(--u)) rgba(0,0,0,.25)}
  #fuelFill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#c7f5ff,#69dfff,#ffe171);transition:width .08s linear;box-shadow:0 0 calc(16*var(--u)) rgba(95,220,255,.35)}
  #phase{position:absolute;top:calc(162*var(--u));left:50%;transform:translate(-50%,-12px);opacity:0;pointer-events:none;text-align:center;color:white;
    transition:opacity .22s,transform .22s;text-shadow:0 calc(3*var(--u)) calc(13*var(--u)) rgba(0,0,0,.5)}
  #phase.show{opacity:1;transform:translate(-50%,0)}
  #phase strong{display:block;font-size:calc(31*var(--u));font-weight:950;letter-spacing:.12em;white-space:nowrap}
  #phase span{display:block;margin-top:calc(6*var(--u));font-size:calc(16*var(--u));font-weight:750;letter-spacing:.04em;opacity:.8}
  #sound{position:absolute;right:calc(18*var(--u));bottom:calc(18*var(--u));width:calc(48*var(--u));height:calc(48*var(--u));border-radius:50%;
    border:1px solid rgba(255,255,255,.26);background:rgba(5,10,18,.34);color:white;font-size:calc(20*var(--u));font-weight:900;backdrop-filter:blur(6px);z-index:6}
  #sound:active{transform:scale(.94)}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:white;z-index:5;
    background:radial-gradient(ellipse at 50% 31%,rgba(29,64,91,.38),rgba(3,7,12,.87) 72%);padding:calc(40*var(--u));transition:opacity .24s}
  .overlay.hide{opacity:0;pointer-events:none}
  .overlay h1{margin:0;font-size:calc(63*var(--u));font-weight:1000;line-height:.93;letter-spacing:.035em;text-shadow:0 calc(6*var(--u)) calc(22*var(--u)) rgba(67,180,255,.28)}
  .overlay .kicker{margin-bottom:calc(12*var(--u));font-size:calc(15*var(--u));font-weight:950;letter-spacing:.27em;color:#a9e9ff}
  .overlay .rule{margin-top:calc(27*var(--u));max-width:88%;font-size:calc(23*var(--u));font-weight:650;line-height:1.5;opacity:.9}
  .overlay .rule b{color:#bfefff}
  .overlay .cta{margin-top:calc(44*var(--u));font-size:calc(19*var(--u));font-weight:950;letter-spacing:.22em;color:#91e6ff;animation:pulse 1.35s ease-in-out infinite}
  .overlay .big{margin-top:calc(18*var(--u));font-size:calc(86*var(--u));font-weight:1000;letter-spacing:-.04em}
  .overlay .sub{font-size:calc(20*var(--u));font-weight:800;opacity:.78}
  .overlay .stats{display:flex;gap:calc(26*var(--u));margin-top:calc(27*var(--u));font-size:calc(16*var(--u));font-weight:850;letter-spacing:.08em;opacity:.8}
  .overlay .new{height:calc(28*var(--u));margin-top:calc(8*var(--u));font-size:calc(18*var(--u));font-weight:950;letter-spacing:.14em;color:#ffe17a}
  @keyframes pulse{0%,100%{opacity:.52}50%{opacity:1}}
</style>
</head>
<body>
<div id="wrap"><div id="stage">
  <canvas id="game" aria-label="Endless Powder skiing game"></canvas>
  <div class="hud" id="depth">0<small> m</small></div>
  <div class="hud" id="combo"></div>
  <div id="threat"><div id="threatFill"></div></div><div class="hud" id="threatLabel">YETI</div>
  <div id="phase"><strong id="phaseName"></strong><span id="phaseNote"></span></div>
  <div id="fuelWrap"><div id="fuelLabel">POWDER</div><div id="fuel"><div id="fuelFill"></div></div></div>
  <button id="sound" aria-label="Toggle sound">♪</button>
  <div class="overlay" id="intro">
    <div class="kicker">A ONE-FINGER DESCENT</div>
    <h1>ENDLESS<br>POWDER</h1>
    <div class="rule">Drag left and right to carve.<br><b>Thread the flags to stay fast.</b><br>The yeti only needs one opening.</div>
    <div class="cta">TAP TO DROP IN</div>
  </div>
  <div class="overlay hide" id="results">
    <div class="kicker" id="resultKicker">THE MOUNTAIN WON</div>
    <h1 id="resultTitle">CAUGHT</h1>
    <div class="big" id="resultDistance">0 m</div>
    <div class="sub" id="resultBest">BEST 0 m</div>
    <div class="new" id="newBest"></div>
    <div class="stats"><span id="resultGates">0 GATES</span><span id="resultCombo">0× BEST CHAIN</span></div>
    <div class="cta">TAP TO SKI AGAIN</div>
  </div>
</div></div>
<script>
'use strict';
/* ENDLESS POWDER — Recut
   One-file phone-first prototype. No external assets or libraries. */
const W=720,H=1280,PLAYER_Y=448,PXM=15.5,EDGE=48,TAU=Math.PI*2,MAX_DT=0.05;
const C={
  baseSpeed:10.6,maxSpeed:34,fuelMax:26,fuelBurn:5.45,speedEase:1.65,
  maxAngle:58*Math.PI/180,turnRate:235*Math.PI/180,returnRate:155*Math.PI/180,steerEase:16,
  playerR:15,gateStart:34,gateAhead:112,behind:48,gateGapEarly:132,gateGapLate:108,
  crashStun:.48,crashIFrame:.82,crashSpeed:.43,
  yetiGrace:32,yetiStart:43,yetiSafe:42,yetiDanger:7,
  huntFirst:14,huntMin:17,huntMax:25,telegraph:.72,lunge:.50,retreatBuffer:44,
  phaseLength:255,seed:0x51a7f00d
};
const $=id=>document.getElementById(id),clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),lerp=(a,b,t)=>a+(b-a)*t;
const cv=$('game'),ctx=cv.getContext('2d',{alpha:false}),stage=$('stage');
const ui={depth:$('depth'),combo:$('combo'),threat:$('threatFill'),fuel:$('fuelFill'),phase:$('phase'),phaseName:$('phaseName'),phaseNote:$('phaseNote'),
  intro:$('intro'),results:$('results'),title:$('resultTitle'),kicker:$('resultKicker'),distance:$('resultDistance'),best:$('resultBest'),newBest:$('newBest'),
  gates:$('resultGates'),chain:$('resultCombo'),sound:$('sound')};
let dpr=1,raf=0,last=0,testMode=false;
function fit(){dpr=Math.min(2,window.devicePixelRatio||1);cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);
  const r=stage.getBoundingClientRect();stage.style.setProperty('--u',(r.width/W)+'px');}
addEventListener('resize',fit,{passive:true});fit();
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
let rng=mulberry32(C.seed);const rand=(a=0,b=1)=>a+(b-a)*rng();
const store=(()=>{try{localStorage.setItem('__ep_check','1');localStorage.removeItem('__ep_check');return localStorage}catch(e){const m={};return{getItem:k=>m[k]??null,setItem:(k,v)=>m[k]=String(v)}}})();
let best=Number(store.getItem('ep_recut_best')||0),soundOn=store.getItem('ep_recut_sound')!=='0',AC=null,noise=null,fxRng=mulberry32(C.seed^0x9e3779b9);
const fxRand=(a=0,b=1)=>a+(b-a)*fxRng();
function audio(){if(!soundOn||testMode)return null;try{if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC}catch(e){return null}}
function tone(a,b,d,type='sine',gain=.16){const ac=audio();if(!ac)return;try{const o=ac.createOscillator(),g=ac.createGain(),t=ac.currentTime;o.type=type;o.frequency.setValueAtTime(a,t);o.frequency.exponentialRampToValueAtTime(Math.max(25,b),t+d);g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+d+.03)}catch(e){}}
function ensureNoise(){const ac=audio();if(!ac||noise)return;const n=ac.sampleRate,buf=ac.createBuffer(1,n,ac.sampleRate),data=buf.getChannelData(0);for(let i=0;i<n;i++)data[i]=Math.random()*2-1;
  const src=ac.createBufferSource(),bp=ac.createBiquadFilter(),gain=ac.createGain();src.buffer=buf;src.loop=true;bp.type='bandpass';bp.frequency.value=1500;bp.Q.value=.8;gain.gain.value=0;src.connect(bp);bp.connect(gain);gain.connect(ac.destination);src.start();noise={gain,bp};}
const sfx={gate:n=>{tone(640+Math.min(n,12)*35,920+Math.min(n,12)*42,.13,'triangle',.19)},perfect:()=>tone(1100,1680,.16,'sine',.14),miss:()=>tone(260,135,.18,'square',.12),
  crash:()=>{tone(150,50,.3,'sawtooth',.24);tone(90,38,.32,'square',.16)},roar:()=>{tone(112,48,.48,'sawtooth',.3);tone(67,36,.55,'square',.16)},phase:()=>tone(430,760,.3,'triangle',.16),caught:()=>tone(115,30,.7,'sawtooth',.35)};
function vibrate(v){if(testMode)return;try{navigator.vibrate&&navigator.vibrate(v)}catch(e){}}
ui.sound.textContent=soundOn?'♪':'×';ui.sound.addEventListener('click',e=>{e.stopPropagation();soundOn=!soundOn;store.setItem('ep_recut_sound',soundOn?'1':'0');ui.sound.textContent=soundOn?'♪':'×';if(!soundOn&&noise)noise.gain.gain.value=0;else audio()});

const phases=[
  {name:'CLEAR RUN',note:'Find the rhythm',snow:0,fog:0,woods:1,night:0},
  {name:'DEEP WOODS',note:'Tighter lines · more timber',snow:0,fog:.05,woods:1.65,night:.08},
  {name:'WHITEOUT',note:'Read the flags, not the horizon',snow:1,fog:.22,woods:.9,night:.12},
  {name:'BLUE HOUR',note:'The mountain wakes up',snow:.25,fog:.12,woods:1.25,night:.72}
];
let S,gates=[],obstacles=[],trees=[],balls=[],particles=[],rings=[],floaters=[],flakes=[];
function fresh(mode='intro'){
  rng=mulberry32(C.seed);fxRng=mulberry32(C.seed^0x9e3779b9);gates=[];obstacles=[];trees=[];balls=[];particles=[];rings=[];floaters=[];flakes=[];
  S={mode,time:0,depth:0,prevDepth:0,x:W/2,prevX:W/2,angle:0,steer:0,steerSm:0,active:false,speed:13.2,fuel:6,
    combo:0,bestCombo:0,gatesHit:0,gatesMiss:0,stun:0,iframe:0,shake:0,flash:0,hitstop:0,trail:[],
    nextGateD:C.gateStart,lastGateX:W/2,side:-1,gateIndex:0,phaseIndex:0,phaseAt:C.phaseLength,phaseTimer:0,
    nextBall:18,deadTimer:0,cause:'',
    yeti:{on:false,d:-C.yetiStart,x:W/2,state:'shadow',cool:C.huntFirst,aimX:W/2,timer:0,fury:0},buffer:999};
  generateTo();updateHUD();
}
function mountainCenter(d){return W/2+Math.sin(d/260)*46+Math.sin(d/710+.8)*25}
function phase(){return phases[S.phaseIndex%phases.length]}
function gateDifficulty(d){return clamp((d-60)/1800,0,1)}
function generateGate(){
  const d=S.nextGateD,k=gateDifficulty(d),spacing=lerp(31,23,k)+rand(-2.5,3.5);S.nextGateD+=spacing;S.gateIndex++;
  let side;
  if(S.gateIndex%7===0)side=0;
  else if(S.gateIndex%9===0)side=S.side;
  else side=-S.side||1;
  if(side!==0)S.side=side;
  const amp=lerp(88,182,k)*(side===0?0:1),wander=mountainCenter(d),center=clamp(wander+side*amp,EDGE+95,W-EDGE-95);
  const half=lerp(C.gateGapEarly,C.gateGapLate,k)/2;
  const g={d,center,half,side,done:false,hit:false,fade:1};gates.push(g);
  const fromD=S.gateIndex===1?0:gates[gates.length-2].d,fromX=S.lastGateX;S.lastGateX=center;
  const woods=phase().woods,count=Math.floor(rand(.4,1.7)*woods+k*1.4);
  for(let i=0;i<count;i++){
    for(let tries=0;tries<10;tries++){
      const od=rand(fromD+4,d-4),t=clamp((od-fromD)/(d-fromD),0,1),path=lerp(fromX,center,t),r=rand(16,24),x=rand(EDGE+32,W-EDGE-32);
      if(Math.abs(x-path)<78+r)continue;
      if(Math.abs(x-(center-half))<35+r&&Math.abs(od-d)<6)continue;
      if(Math.abs(x-(center+half))<35+r&&Math.abs(od-d)<6)continue;
      obstacles.push({d:od,x,r,type:rng()<.69?'tree':'rock',tilt:rand(-.12,.12),snow:rand(.7,1)});break;
    }
  }
  const td0=Math.floor(fromD/5)*5;
  for(let td=td0;td<d;td+=5){for(const sideEdge of[-1,1]){if(rng()<.82){const x=sideEdge<0?rand(7,EDGE+8):rand(W-EDGE-8,W-7);trees.push({d:td+rand(-1.4,1.4),x,s:rand(16,30),lean:rand(-.1,.1),eyes:rng()<.08})}}}
}
function generateTo(){while(S.nextGateD<S.depth+C.gateAhead)generateGate();
  gates=gates.filter(g=>g.d>S.depth-C.behind);obstacles=obstacles.filter(o=>o.d>S.depth-C.behind);trees=trees.filter(t=>t.d>S.depth-C.behind);balls=balls.filter(b=>b.d>S.depth-55&&b.d<S.depth+90)}
function announce(name,note){ui.phaseName.textContent=name;ui.phaseNote.textContent=note;ui.phase.classList.add('show');S.phaseTimer=2.15;sfx.phase()}
function switchPhase(){S.phaseIndex++;S.phaseAt+=C.phaseLength;announce(phase().name,phase().note)}
function spawnParticles(x,d,color,n=14,power=90){for(let i=0;i<n;i++){const a=fxRand(0,TAU),v=fxRand(.3,1)*power;particles.push({x,d,vx:Math.cos(a)*v,vd:Math.sin(a)*v/PXM,t:fxRand(.35,.75),r:fxRand(1.5,3.6),color})}}
function ring(x,d,color,size=0){rings.push({x,d,t:.44,color,size})}
function floatText(text,x,d,color='#fff',size=25){floaters.push({text,x,d,t:.9,color,size})}
function gateCross(g,px){
  g.done=true;const left=g.center-g.half,right=g.center+g.half,poleR=13;
  if(Math.abs(px-left)<poleR+C.playerR||Math.abs(px-right)<poleR+C.playerR){g.fade=.25;crash('FLAG');return}
  if(px>left+C.playerR*.25&&px<right-C.playerR*.25){
    g.hit=true;S.combo++;S.bestCombo=Math.max(S.bestCombo,S.combo);S.gatesHit++;
    const perfect=Math.abs(px-g.center)<18,reward=7.2+Math.min(S.combo,10)*.16+(perfect?1.2:0);S.fuel=Math.min(C.fuelMax,S.fuel+reward);
    ring(g.center,g.d,perfect?'rgba(255,231,120,.95)':'rgba(112,231,255,.9)',perfect?25:8);spawnParticles(px,g.d,perfect?'#ffe879':'#b8f3ff',perfect?25:14,perfect?125:85);
    if(perfect){floatText('PERFECT',px,g.d-1,'#ffe879',24);sfx.perfect()}else sfx.gate(S.combo);vibrate(perfect?24:12);
  }else{
    S.gatesMiss++;S.combo=0;S.fuel=Math.max(0,S.fuel-2.5);S.yeti.cool=Math.min(S.yeti.cool,4.2);S.yeti.fury=Math.min(1,S.yeti.fury+.12);
    g.fade=.38;floatText('MISSED',g.center,g.d-1,'#ffb2a8',22);ring(g.center,g.d,'rgba(255,105,92,.75)',0);sfx.miss();
  }
}
function crash(label='CRASH'){
  if(S.iframe>0||S.mode!=='play')return;S.combo=0;S.fuel=0;S.speed*=C.crashSpeed;S.stun=C.crashStun;S.iframe=C.crashIFrame;S.shake=18;S.flash=.42;S.hitstop=.08;
  S.yeti.cool=Math.min(S.yeti.cool,2.2);S.yeti.fury=Math.min(1,S.yeti.fury+.3);spawnParticles(S.x,S.depth,'#ffffff',30,135);floatText(label,S.x,S.depth-1,'#fff',27);sfx.crash();vibrate(55);
}
function spawnBall(){balls.push({d:S.depth-32,x:rand(EDGE+45,W-EDGE-45),r:rand(19,30),speed:S.speed+rand(7,11),vx:rand(-34,34),spin:0});S.nextBall=rand(11,18)}
function die(cause='caught'){if(S.mode!=='play')return;S.mode='dying';S.deadTimer=.72;S.cause=cause;S.shake=16;sfx.caught();vibrate([70,45,120]);if(noise)noise.gain.gain.value=0}
function finalizeDeath(){
  S.mode='dead';const score=Math.floor(S.depth),isBest=score>best;if(isBest){best=score;store.setItem('ep_recut_best',String(best))}
  ui.title.textContent='CAUGHT';ui.kicker.textContent=S.cause==='lunge'?'YOU DODGED TOO LATE':'THE MOUNTAIN WON';ui.distance.textContent=score+' m';ui.best.textContent='BEST '+Math.floor(best)+' m';
  ui.newBest.textContent=isBest?'NEW BEST':'';ui.gates.textContent=S.gatesHit+' GATES';ui.chain.textContent=S.bestCombo+'× BEST CHAIN';ui.results.classList.remove('hide')
}
function sweptDistance(ax,ay,bx,by,px,py){const dx=bx-ax,dy=by-ay,l=dx*dx+dy*dy,t=l?clamp(((px-ax)*dx+(py-ay)*dy)/l,0,1):0,cx=ax+dx*t,cy=ay+dy*t;return Math.hypot(px-cx,py-cy)}
function updateYeti(dt){const Y=S.yeti;if(!Y.on&&S.depth>C.yetiGrace){Y.on=true;Y.d=S.depth-C.yetiStart;Y.x=S.x;Y.cool=C.huntFirst}
  if(!Y.on)return;S.buffer=S.depth-Y.d;Y.cool-=dt;Y.fury=Math.max(0,Y.fury-dt*.012);
  if(Y.state==='shadow'){
    let ys=10.1+Math.min(6.7,S.depth*.0042)*(1+Y.fury*.08);if(S.buffer>C.yetiSafe)ys=Math.max(ys,S.speed+1.4);
    Y.d+=ys*dt;Y.x+=(S.x-Y.x)*Math.min(1,1.5*dt);
    if(Y.cool<=0&&S.depth>110){Y.state='hunt';Y.timer=4.6;sfx.roar();announce('HUNT','Cut hard when it commits');vibrate(28)}
  }else if(Y.state==='hunt'){
    Y.timer-=dt;Y.d+=(S.speed+8+Y.fury*4)*dt;Y.x+=(S.x-Y.x)*Math.min(1,2.7*dt);
    if(S.depth-Y.d<9.5||Y.timer<=0){Y.state='telegraph';Y.timer=C.telegraph;Y.aimX=S.x;tone(90,58,.28,'sawtooth',.19)}
  }else if(Y.state==='telegraph'){
    Y.timer-=dt;Y.d+=S.speed*dt;Y.x+=(Y.aimX-Y.x)*Math.min(1,5*dt);
    if(Y.timer<=0){Y.state='lunge';Y.timer=C.lunge;sfx.roar();S.shake=Math.max(S.shake,8)}
  }else if(Y.state==='lunge'){
    Y.timer-=dt;Y.d+=(S.speed+26)*dt;Y.x+=(Y.aimX-Y.x)*Math.min(1,10*dt);
    if(S.depth-Y.d<=0){if(Math.abs(Y.x-S.x)<52){die('lunge');return}else{Y.state='retreat';Y.timer=0;Y.fury=Math.min(1,Y.fury+.12);spawnParticles(Y.x,Y.d,'#dff5ff',24,130);ring(Y.x,Y.d,'rgba(210,245,255,.9)',28);tone(150,62,.28,'square',.2);S.shake=Math.max(S.shake,10)}}

let pointerId=null,startX=0;
function pointerDown(e){if(e.target===ui.sound)return;e.preventDefault();audio();ensureNoise();if(S.mode==='intro'){startGame();return}if(S.mode==='dead'){startGame();return}if(S.mode!=='play')return;pointerId=e.pointerId;startX=e.clientX;S.active=true;S.steer=0;try{cv.setPointerCapture(pointerId)}catch(_){}}
function pointerMove(e){if(e.pointerId!==pointerId||S.mode!=='play')return;e.preventDefault();const rect=stage.getBoundingClientRect(),dx=(e.clientX-startX)*(W/rect.width);S.steer=clamp(dx/155,-1,1)}
function pointerUp(e){if(e.pointerId!==pointerId)return;pointerId=null;S.active=false;S.steer=0}
cv.addEventListener('pointerdown',pointerDown,{passive:false});cv.addEventListener('pointermove',pointerMove,{passive:false});cv.addEventListener('pointerup',pointerUp,{passive:false});cv.addEventListener('pointercancel',pointerUp,{passive:false});
ui.intro.addEventListener('pointerdown',pointerDown,{passive:false});ui.results.addEventListener('pointerdown',pointerDown,{passive:false});
function startGame(){fresh('play');ui.intro.classList.add('hide');ui.results.classList.add('hide');announce('CLEAR RUN','Find the rhythm');audio();ensureNoise()}
function frame(t){const dt=Math.min(MAX_DT,(t-last)/1000||0);last=t;update(dt);render();raf=requestAnimationFrame(frame)}
fresh('intro');raf=requestAnimationFrame(frame);

// Small deterministic hook used for smoke tests and balancing.
window.__EP={
  start:()=>{testMode=true;fresh('play')},
  snapshot:()=>JSON.parse(JSON.stringify({mode:S.mode,depth:S.depth,x:S.x,speed:S.speed,fuel:S.fuel,combo:S.combo,bestCombo:S.bestCombo,gatesHit:S.gatesHit,gatesMiss:S.gatesMiss,buffer:S.buffer,yetiState:S.yeti.state})),
  step:(seconds=1,mode='straight')=>{testMode=true;const frames=Math.ceil(seconds*60);for(let i=0;i<frames&&S.mode==='play';i++){if(mode==='follow'){const g=gates.find(q=>!q.done&&q.d>S.depth),target=g?g.center:W/2,Sx=clamp((target-S.x)/130,-1,1);S.active=true;S.steer=Sx}else if(mode==='slalom'){S.active=true;S.steer=Math.sin(S.time*1.8)}else{S.active=false;S.steer=0}update(1/60)}return window.__EP.snapshot()},
  reset:()=>{testMode=false;fresh('intro')}
};
window.addEventListener('error',e=>{console.error('ENDLESS POWDER ERROR',e.error||e.message)});
</script>
