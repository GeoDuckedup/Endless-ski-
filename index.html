    max-height:62%;overflow:auto;background:rgba(8,12,20,.94);border:1px solid rgba(255,255,255,.18);border-radius:16px;

    overflow-y:auto;background:radial-gradient(ellipse at 50% 35%,rgba(20,32,52,.55),rgba(4,6,10,.86));color:#fff;text-align:center;
    pointer-events:auto;opacity:1;transition:opacity .25s}
  .ov.hide{opacity:0;pointer-events:none}
  .ov h1{font-size:calc(66*var(--u));font-weight:900;letter-spacing:.04em;margin:0 0 calc(8*var(--u));
    text-shadow:0 calc(4*var(--u)) calc(18*var(--u)) rgba(90,180,255,.35)}
  .ov .sub{font-size:calc(26*var(--u));opacity:.85;max-width:80%;line-height:1.5}

  .ov .big{font-size:calc(88*var(--u));font-weight:900;margin:calc(14*var(--u)) 0 0}
  .ov .best{font-size:calc(24*var(--u));opacity:.75;margin-top:calc(4*var(--u))}
  .ov .go{margin-top:calc(40*var(--u));font-size:calc(26*var(--u));font-weight:800;letter-spacing:.18em;

  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  #rStrip{position:relative;width:64%;height:calc(9*var(--u));margin-top:calc(26*var(--u));

  #rStrip i{position:absolute;top:calc(-5*var(--u));width:max(4px,calc(5*var(--u)));height:calc(19*var(--u));border-radius:calc(2*var(--u));transform:translateX(-50%)}
  #tYou{background:#ff6a5e}#tBest{background:#ffd76a}

  #lbWrap{margin-top:calc(20*var(--u));width:72%;pointer-events:auto}
  #lbEntry{display:flex;gap:calc(10*var(--u));justify-content:center;margin-bottom:calc(14*var(--u))}
  #lbInit{width:calc(120*var(--u));text-align:center;font-size:calc(34*var(--u));font-weight:900;
    letter-spacing:.35em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.35);border-radius:calc(10*var(--u));padding:calc(6*var(--u)) 0;outline:none}
  #lbGo{font-size:calc(20*var(--u));font-weight:800;letter-spacing:.12em;color:#0a1420;
    background:#8fd8ff;border:none;border-radius:calc(10*var(--u));padding:0 calc(18*var(--u))}
  .lbRow{display:flex;align-items:center;gap:calc(12*var(--u));font-size:calc(22*var(--u));
    padding:calc(3*var(--u)) 0;font-variant-numeric:tabular-nums}

  #lbStatus{margin-top:calc(8*var(--u));font-size:calc(16*var(--u));opacity:.6;min-height:calc(18*var(--u))}

<body>
<div id="wrap"><div id="stage">
  <canvas id="cv"></canvas>
  <div class="hud" id="hDepth">0<small> m</small></div>
  <div class="hud" id="hCombo"></div>
  <div class="btnrow" id="btnRow">
    <button class="ib" id="bTune" type="button" aria-label="Open tuning controls">⚙︎</button>

  </div>
  <div id="tunePanel">
    <label><span class="nm">Return to center</span><input type="range" id="sReturn" min="0" max="260" step="5" value="170"><span class="vl" id="vReturn">170</span></label>
    <label><span class="nm">Turn rate</span><input type="range" id="sTurn" min="120" max="320" step="5" value="240"><span class="vl" id="vTurn">240</span></label>
    <label><span class="nm">Flag fuel</span><input type="range" id="sFuel" min="3" max="14" step="0.5" value="7"><span class="vl" id="vFuel">7</span></label>
    <label><span class="nm">Bleed</span><input type="range" id="sBleed" min="0.1" max="0.9" step="0.05" value="0.4"><span class="vl" id="vBleed">0.40</span></label>
    <label><span class="nm">Yeti pressure</span><input type="range" id="sYeti" min="0.75" max="1.25" step="0.05" value="1"><span class="vl" id="vYeti">1.00</span></label>
    <label><span class="nm">Obstacles</span><input type="range" id="sObs" min="3" max="11" step="1" value="7"><span class="vl" id="vObs">7</span></label>
  </div>
  <div class="ov" id="ovIntro">

    <div class="sub">Drag anywhere to carve.<br><b>Flags are fuel. Speed is life.</b><br>Something hungry follows the slowest skier down.</div>

  </div>
  <div class="ov hide" id="ovResults">

      <div id="lbEntry" style="display:none">

    <div id="rLegend"><span><b class="you"></b>RUN</span><span id="rPrevLegend"><b class="bestMark"></b>PREVIOUS BEST</span></div>
    <div class="go">TAP TO RETRY</div>
  </div>
</div></div>
<script>
'use strict';
/* ============================ CONSTANTS ============================ */
const LW=720, BASE_LH=1280, PXM=16, EDGE=40, PR=12, MAX_DT=0.05;
let LH=BASE_LH, PIN_Y=0.36*LH;
const D2R=Math.PI/180;
const C={
  thetaMax:62*D2R, turnRate:240*D2R, returnRate:170*D2R,
  touchDZ:12, touchFull:155, steerLerp:28,
  glide:10.8, speedMax:40, bleed:0.40, flagFuel:7, fuelPerCombo:0.10, comboFuelCap:10, poolCap:26, fuelRate:15,
  crashCut:0.45, faultCut:0.82,
  stun:0.45, iframe:0.55, forgive:0.62, hitstop:0.12,
  chunk:22, ahead:108,
  corStart:300, corMin:148, corShrink:0.05,
  gateChance:0.68,
  obsMax:7,
  yetiGrace:30, yetiStart:42, yetiBase:10, yetiPressure:1, yetiXL:1.6, SAFE:30,
  lungeMin:6, lungeMax:10, teleT:0.6, lungeT:0.4, lungeBoost:16,
  feast:1.7, killCam:0.6, edgeCam:0.45,
  furyCrash:0.35, furyFault:0.12, furyStreakW:0.4, furyCalm:0.34, furyDecay:0.02,
  furySpeed:0.15, furyLunge:0.45, sprint:8, sprintFury:4, rest:4, restFury:1.8, tiredMul:0.75,
  passFirst:130, passMin:25, passSpan:20,
  grabR:46, whiffBack:7, whiffFury:0.25, whiffStag:0.8,
  lungeMissBack:3, lungeMissFury:0.1, lungeMissStag:0.5,
  npcChance:0.22, boulderAfter:240, boulderRate:0.045,
  phaseMin:230, phaseMax:320,
  markerCap:180, SEED:1337
};
/* ==================== MODULE: PERFORMANCE BUDGETS ==================== */
const PerfBudget=(()=>{
  const profiles=[
    {name:'LOW',dpr:1.15,fx:0.48,snow:120,spray:260,parts:120,rings:28,defStrips:12,groundStep:2,treeStep:2,glints:2,lights:false},
    {name:'MED',dpr:1.5,fx:0.72,snow:210,spray:430,parts:190,rings:40,defStrips:18,groundStep:1,treeStep:1,glints:3,lights:true},
    {name:'HIGH',dpr:2,fx:1,snow:320,spray:650,parts:280,rings:56,defStrips:24,groundStep:1,treeStep:1,glints:4,lights:true}
  ];
  let level=1,avg=12,slowFrames=0,fastFrames=0,lastChange=0;
  function initial(){
    const coarse=!!(window.matchMedia&&matchMedia('(pointer:coarse)').matches);
    const hc=navigator.hardwareConcurrency||4,mem=navigator.deviceMemory||4;
    if(hc<=2||mem<=2)return 0;
    if(!coarse&&hc>=8&&mem>=8)return 2;
    return 1;
  }
  function profile(){return profiles[level];}
  function setLevel(next){next=clamp(next,0,profiles.length-1);if(next===level)return false;
    level=next;slowFrames=fastFrames=0;lastChange=performance.now();
    try{resize();}catch(e){}return true;}
  function noteFrame(ms){
    avg=lerp(avg,ms,0.035);
    if(performance.now()-lastChange<4000)return;
    if(avg>20.5){slowFrames++;fastFrames=0;}else if(avg<11.5){fastFrames++;slowFrames=0;}else{slowFrames=Math.max(0,slowFrames-1);fastFrames=Math.max(0,fastFrames-1);}
    if(slowFrames>90)setLevel(level-1);
    else if(fastFrames>720)setLevel(level+1);
  }
  function init(){level=initial();lastChange=performance.now();}
  return Object.freeze({profiles,profile,init,noteFrame,setLevel,get level(){return level;},get avg(){return avg;}});
})();
/* ==================== MODULE: FIXED DEPTH DIFFICULTY ==================== */
const Difficulty=(()=>{
  const smooth=(a,b,d)=>{const t=clamp((d-a)/(b-a),0,1);return t*t*(3-2*t);};
  function profile(d){
    const intro=smooth(0,650,d);
    const long=smooth(500,8200,d);
    const layout=clamp(intro*0.68+long*0.32,0,1);
    const penalty=smooth(500,7500,d);
    const speed=smooth(300,4800,d);
    const attack=smooth(800,8200,d);
    const overtime=d>8500?0.5+0.5*Math.sin((d-8500)/350):0;
    return{layout,penalty,speed,attack,overtime};
  }
  function hurryPass(seconds){
    if(!S||!S.yeti||!S.yeti.on||S.yeti.pass!==0)return;
    S.yeti.passNext=Math.min(S.yeti.passNext||Infinity,S.time+Math.max(1,seconds));
  }
  return Object.freeze({profile,hurryPass});
})();
/* ============================ HELPERS ============================ */
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,k)=>a+(b-a)*k;
const hshG=n=>{const x=Math.sin(n*127.1)*43758.5453;return x-Math.floor(x);};
function powderAt(x,d){ // deterministic deep-powder patches on the seeded mountain
  const cs=90;let k=0;const ci0=Math.floor(d/cs);
  for(let ci=ci0-1;ci<=ci0+1;ci++){
    if(hshG(ci*7.13)<0.28)continue;
    const cx=EDGE+60+hshG(ci*3.7)*(LW-2*EDGE-120);
    const cd=(ci+0.5)*cs+(hshG(ci*9.1)-0.5)*40;
    const rx=150+hshG(ci*5.3)*165,rd=34+hshG(ci*2.9)*34;
    const q=((x-cx)/rx)*((x-cx)/rx)+((d-cd)/rd)*((d-cd)/rd);
    if(q<1)k=Math.max(k,1-q);
  }
  return k;
}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
/* ====================== MODULE: PERSISTENCE ====================== */
const Persistence=(()=>{
  const store=(()=>{try{const k='__ep_t',s=window.localStorage;s.setItem(k,'1');s.removeItem(k);return s;}
    catch(e){const m={};return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v);},removeItem:k=>{delete m[k];}};}})();
  const getJSON=(key,fallback)=>{try{const v=JSON.parse(store.getItem(key)||'null');return v===null?fallback:v;}catch(e){return fallback;}};
  const setJSON=(key,value)=>{try{store.setItem(key,JSON.stringify(value));return true;}catch(e){return false;}};
  return Object.freeze({store,getJSON,setJSON});
})();
const store=Persistence.store;
const vib=ms=>{try{if(navigator&&navigator.vibrate)navigator.vibrate(ms);}catch(e){}};
const $=id=>document.getElementById(id);
/* ============================ DOM ============================ */
const cv=$('cv'), stage=$('stage');
const ctx=cv.getContext('2d');
const el={depth:$('hDepth'),combo:$('hCombo'),
  intro:$('ovIntro'),results:$('ovResults'),rTitle:$('rTitle'),rTag:$('rTag'),rDist:$('rDist'),rBest:$('rBest'),
  tune:$('tunePanel')};
/* ============================ AUDIO ============================ */
let AC=null, sndOn=store.getItem('ep_snd')!=='0';
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state==='suspended'){try{const p=AC.resume();if(p&&p.catch)p.catch(()=>{});}catch(e){}} return AC;}
function tone(f0,f1,dur,type,gain){const a=sndOn&&ac();if(!a)return;
  try{const o=a.createOscillator(),g=a.createGain(),t=a.currentTime;
  o.type=type;o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),t+dur);
  g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+.02);}catch(e){}}
let hiss=null;
function ensureHiss(){const a=AC;if(!a||hiss)return;
  try{const len=a.sampleRate|0,buf=a.createBuffer(1,len,a.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  // edge hiss (bandpass)
  const src=a.createBufferSource();src.buffer=buf;src.loop=true;
  const bp=a.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1600;bp.Q.value=0.8;
  const g=a.createGain();g.gain.value=0;
  src.connect(bp);bp.connect(g);g.connect(a.destination);src.start();
  // body rumble + deep-powder whoosh (lowpass)
  const src2=a.createBufferSource();src2.buffer=buf;src2.loop=true;
  const lp=a.createBiquadFilter();lp.type='lowpass';lp.frequency.value=220;
  const g2=a.createGain();g2.gain.value=0;
  src2.connect(lp);lp.connect(g2);g2.connect(a.destination);src2.start();
  hiss={g,bp,g2,buf};}catch(e){hiss=null;}}
function crunch(vol){ // one grain of snow crust giving way
  const a=AC;if(!a||!sndOn||!hiss||!hiss.buf)return;
  try{const src=a.createBufferSource();src.buffer=hiss.buf;
    src.playbackRate.value=0.7+Math.random()*0.9;
    const bp=a.createBiquadFilter();bp.type='bandpass';
    bp.frequency.value=500+Math.random()*2500;bp.Q.value=1.2;
    const g=a.createGain(),t=a.currentTime;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    src.connect(bp);bp.connect(g);g.connect(a.destination);
    src.start(t,Math.random()*0.5,0.06);src.stop(t+0.07);}catch(e){}}
const sfx={
  gate:c=>tone(740+Math.min(c,20)*36,(740+Math.min(c,20)*36)*1.5,0.14,'triangle',0.22),
  miss:()=>tone(300,180,0.16,'square',0.16),
  crash:()=>{tone(160,60,0.28,'sawtooth',0.3);tone(90,40,0.34,'square',0.22);},
  roar:()=>{tone(120,55,0.55,'sawtooth',0.4);tone(70,40,0.6,'square',0.2);},
  growl:()=>tone(85,60,0.32,'sawtooth',0.25),
  phase:()=>{tone(520,780,0.22,'triangle',0.18);},
  eat:()=>tone(140,70,0.3,'square',0.2)
};
const Audio=Object.freeze({ac,tone,ensureHiss,crunch,sfx,
  get enabled(){return sndOn;},
  toggle(){sndOn=!sndOn;store.setItem('ep_snd',sndOn?'1':'0');if(!sndOn&&hiss){hiss.g.gain.value=0;hiss.g2.gain.value=0;}return sndOn;}
});
/* ============================ PHASES ============================ */
function baseM(){return{bleed:1,fuel:1,obs:1,yeti:1,npc:1,turn:1,alt:false,snow:false};}
let M=baseM();
const PHASES=[
  {n:'CLEAR SKIES',w:2,f:m=>{}},
  {n:'BLIZZARD',w:1,f:m=>{m.turn=0.72;m.bleed=0.6;m.snow=true;}},
  {n:'RUSH HOUR',w:1,f:m=>{m.npc=2.4;}},
  {n:'DEEP WOODS',w:1,f:m=>{m.obs=1.6;m.fuel=1.3;}},
  {n:'SWITCHBACK',w:1,f:m=>{m.alt=true;m.fuel=1.3;}},
  {n:'HUNGRY',w:1,f:m=>{m.yeti=1.22;m.fuel=1.5;}}
];
/* ==================== ONLINE LEADERBOARD (Firebase RTDB REST) ====================
   Ported from JumpOvertheMoon's HighScoreService. Set FIREBASE_DB_URL to enable —
   leave empty and the feature hides itself entirely. No SDK: plain REST + fetch. */
let FIREBASE_DB_URL='https://endless-powder-default-rtdb.firebaseio.com';
const LB_PATH='/endless_powder/scores', LB_SIZE=10, LB_REFRESH=30000;
const LB_BAD=/^(ASS|FUK|FUC|FCK|SHT|SHI|DIK|DIQ|DIC|COK|COC|CUM|FAG|FAT|GAY|GOD|JEW|KKK|NIG|NGA|NGR|PIS|POO|SEX|TIT|TTS|WTF|STF|SUK|SUC|VAG|WOP|KYS|RAP|FKU|CNT|CUN|HOR|HO3|ANU|ANL|BUT|BUM|DAM|DMN|HEL|JIZ|KIK|PEN|PHK|SCK|SLT|SMD)$/;
const LB=(()=>{
  let cache={initials:'AAA',top:[],pending:[]};
  try{const c=JSON.parse(store.getItem('ep_lb')||'{}');if(c&&typeof c==='object')cache=Object.assign(cache,c);}catch(e){}
  let lastRefresh=0,busy=false,lastSub=null;

  else if(S.combo===0&&S.speed<C.glide+3){title='Caught';tag='Ran out of speed';}
  else if(S.combo===0){title='Caught';tag='Lost the rhythm';}
  else{title='Caught';tag='Caught by the yeti';}
  el.rTitle.textContent=title;el.rTag.textContent=tag;
  el.rDist.textContent=dist+' m';el.rBest.textContent='BEST '+Math.floor(best)+' m';
  lastDeathReal=Date.now();
  const span=Math.max(oldBest,dist,1);
  $('tYou').style.left=(dist/span*96)+'%';
  $('tBest').style.left=(oldBest/span*96)+'%';
  $('tBest').style.display=oldBest>0?'block':'none';
  $('rPrevLegend').style.display=oldBest>0?'flex':'none';
  $('btnRow').style.display='flex';
  el.results.classList.remove('hide');
}
/* ============================ PHASE SWITCH ============================ */
function switchPhase(){
  let pool=PHASES.filter(p=>p!==S.phase),tw=0;for(const p of pool)tw+=p.w;
  let r=Math.random()*tw,pick=pool[0];
  for(const p of pool){r-=p.w;if(r<=0){pick=p;break;}}
  S.phase=pick;M=baseM();pick.f(M);
  S.phaseAt=S.depth+C.phaseMin+Math.random()*(C.phaseMax-C.phaseMin);
  sfx.phase();
}
/* ============================ UPDATE ============================ */
function segDist(ax,ay,bx,by,px,py){
  const dx=bx-ax,dy=by-ay,L2=dx*dx+dy*dy;
  const t=L2?clamp(((px-ax)*dx+(py-ay)*dy)/L2,0,1):0;
  const cx=ax+dx*t,cy=ay+dy*t;return Math.hypot(px-cx,py-cy);
}
function update(dt){
  if(S.mode==='dying'){S.dying-=dt;S.shake=Math.max(S.shake,S.cause==='caught'?10+(1-S.dying/C.killCam)*8:8);
    if(S.dying<=0)finalizeDeath();return;}
  if(S.mode!=='play')return;
  const Q=PerfBudget.profile();
  S.time+=dt;
  DEF.tick(dt);
  if(S.hitstop>0){S.hitstop-=dt;return;}
  S.stun=Math.max(0,S.stun-dt);S.iframe=Math.max(0,S.iframe-dt);
  S.flash=Math.max(0,S.flash-dt*2.2);S.shake=Math.max(0,S.shake-60*dt);
  S.comboPulse=Math.max(0,S.comboPulse-dt*3);
  // camera breathes with speed: farther lookahead when fast, slight lead into the carve
  S.camZ+=((220+(S.speed/C.speedMax)*140)-S.camZ)*Math.min(1,1.5*dt);
  S.camLead+=((Math.sin(S.theta)*(S.speed/C.speedMax)*90)-S.camLead)*Math.min(1,3*dt);
  // springy visual bank (overshoots on edge snaps)
  S.bankV+=((S.theta-S.bank)*150-S.bankV*12)*dt;S.bank+=S.bankV*dt;
  // powder field: how deep is the snow under the skis right now
  S.powK+=(powderAt(S.x,S.depth)-S.powK)*Math.min(1,6*dt);
  // immersion: slow + flat + deep powder buries the skis; speed planes them out
  {const spkS=S.speed/C.speedMax,flatS=1-Math.abs(Math.sin(S.theta));
   const sinkT=clamp((0.48+0.90*S.powK)*(1-0.54*spkS)*(0.42+0.58*flatS)*1.9,0,0.98);
   S.sink+=(sinkT-S.sink)*Math.min(1,3.5*dt);}

  S.speed+=(C.glide-S.speed)*C.bleed*M.bleed*dt;
  const pour=Math.min(S.fuel,C.fuelRate*dt);S.fuel-=pour;S.speed=Math.min(C.speedMax,S.speed+pour);
  // phase
  if(S.depth>S.phaseAt)switchPhase();
  // snowfall
  if(M.snow){
    while(snow.length<Q.snow)snow.push({x:Math.random()*LW,y:Math.random()*LH,vx:(Math.random()-0.5)*60,r:1+Math.random()*2.6});
    if(snow.length>Q.snow)snow.splice(0,snow.length-Q.snow);

      if(f.y>LH+12){f.y=-10;f.x=Math.random()*LW;}

  }else if(snow.length){ // storm tapers out instead of vanishing

  const edgeK=Math.abs(Math.sin(S.theta));
  const rateK=clamp(Math.abs(S.turnVel)/(210*D2R),0,1);

  const bodyTarget=7.8*S.sink+powderSettle-0.35*speedK*S.powK+0.75*S.turnPressure+bob;

      gravity:80,t:0.50+Math.random()*0.34,r:2.6+Math.random()*5.0});
    const chunkChance=clamp(0.06+0.16*S.powK+0.18*pressure,0,0.34);

  }

    for(let i=0;i<n;i++){const sd=i%2?-1:1;pushSpray({type:'mist',front:Math.random()<0.24,

      vx:sd*(18+Math.random()*34)-Math.sin(S.theta)*30,vy:-20+Math.random()*28,

      x:S.x-sdir*8,y:PIN_Y+(S.bodyY||0)+10,

      gravity:i%4===0?320:250,t:0.34+Math.random()*0.22,r:1.7+Math.random()*2.4,

    for(let i=0;i<tipN;i++){
      const sk=i%2?-1:1, th=S.theta, sn=Math.sin(th), off=(9+10*Math.abs(sn))*0.42;
      const sx=S.x+Math.cos(th)*off*sk-sn*4, sy=PIN_Y+(S.bodyY||0)+4+Math.random()*4;
      pushSpray({type:i%2===0?'dense':'mist',front:true,
        x:sx,y:sy, vx:sk*(6+Math.random()*22)-Math.sin(th)*(18+Math.random()*16),
        vy:-14+Math.random()*22, gravity:i%2===0?220:76, t:0.14+Math.random()*0.10, r:1.4+Math.random()*1.8});
    }
  }
  for(let i=spray.length-1;i>=0;i--){const p=spray[i];p.t-=dt;

      if(p.type==='chunk'){
        DEF.stamp('lip',p.x,S.depth+(p.y-PIN_Y)/PXM,2.2+p.r*0.45,0.18+Math.min(0.18,p.r*0.025));
        for(let k=0;k<2;k++)pushSpray({type:'dense',front:false,x:p.x,y:p.y,
          vx:(Math.random()-0.5)*65,vy:-18+Math.random()*24,gravity:250,
          t:0.10+Math.random()*0.09,r:0.7+Math.random()*1.1});
      }else if(p.type==='dense'&&Math.random()<0.16){
        DEF.stamp('lip',p.x,S.depth+(p.y-PIN_Y)/PXM,1.5,0.10);
      }
      spray.splice(i,1);}}

  // fresh visual trail close to the skier; the persistent deformation carries older history

  { // continuous directional ski cuts: trench + compression + displaced outside berm

      // npc hits obstacle
      for(const o of obs){if(Math.abs(o.d-n.d)<1.4&&Math.abs(o.x-n.x)<o.r*C.forgive+10){
        n.down=1+Math.random()*0.2;burstAt(n.x,n.d,'#ffb066',12,80);
        bloodSmear(n.x,n.d,Math.sign(n.vx)||0,1,0.6);break;}}
      // npc hits player
      if(S.iframe<=0&&Math.abs(n.d-S.depth)<1.5&&Math.abs(n.x-S.x)<PR+11){
        if(S.speed>=0.6*C.speedMax)barge(n);else shove(n);}
    }

    const st=S.buffer>20?0:S.buffer>7?1:2;
    if(st>Y.st){sfx.roar();S.shake=Math.max(S.shake,8+st*3);vib(40);}
    Y.st=st;
    Y.fury=Math.max(0,Y.fury-C.furyDecay*dt);
    // sprint/rest: a predator can't run forever — fury lengthens sprints, shortens rests
    if(Y.tired>0){Y.tired-=dt;Y.pant-=dt;
      if(Y.pant<=0){Y.pant=0.6;tone(95,70,0.16,'sawtooth',0.12);}}
    else if(st>=1&&Y.pass===0){Y.press+=dt;
      const sprint=lerp(7.0,12.0,D.attack)+C.sprintFury*Y.fury;
      if(Y.press>sprint){Y.tired=Math.max(1.5,lerp(4.5,2.2,D.attack)-C.restFury*Y.fury);Y.press=0;}}
    else Y.press=Math.max(0,Y.press-dt*0.5);
    if(Y.fury>0.6){Y.snarl-=dt;if(Y.snarl<=0){Y.snarl=3+Math.random()*2;sfx.growl();S.shake=Math.max(S.shake,3);}}
    // hunting passes: it attacks on its own schedule, however far behind it fell
    if(Y.pass===0&&Y.eat<=0&&Y.stag<=0&&S.depth>C.passFirst&&S.time>Y.passNext&&S.buffer>18){
      Y.pass=1;vib(30); // you hear it coming before you see it: a rising drone unlike any roar

    }
    let adv=0;
    const deepK=D.attack;
    if(Y.stag>0){Y.stag-=dt;adv=0;if(Y.pass===1||Y.pass===2)passBreak();} // a dodged strike ends the hunt

    else if(Y.pass===1){ // approach: closes fast regardless of gap

    }
    else if(Y.pass===2){ // press: it grinds in, then strikes — dodge the strike or lose the ground

      if(Y.tele>0){Y.tele-=dt;adv=S.speed; // crouches, matching your pace
        if(Y.tele<=0){Y.burst=C.lungeT;sfx.roar();S.shake=Math.max(S.shake,8);}}
      else if(Y.burst>0){Y.burst-=dt;adv=S.speed+C.lungeBoost; // the strike always resolves: catch, or whiff past you
        if(Y.burst<=0&&Math.abs(Y.x-S.x)>C.grabR)lungeMiss();}
      else{adv=S.speed+4;
        if(Y.passLunges>0&&S.buffer<6){Y.passLunges--;Y.tele=Y.teleMax=lerp(C.teleT,0.43,D.attack);Y.aimX=S.x;sfx.growl();}
        else if(Y.passLunges<=0&&S.buffer>10)passBreak();}
      if(Y.passT<=0)passBreak();
    }
    else if(Y.pass===3){ // retreat: falls away to the shadows
      adv=Math.max(0,S.speed-7);
      if(S.buffer>C.SAFE+6)Y.pass=0;

        ctx.beginPath();ctx.moveTo(sk*6,-15);ctx.lineTo(sk*6,entry);ctx.stroke();}
      // exposed portion: solid
      ctx.strokeStyle='#1c2836';ctx.lineWidth=4.5;
      ctx.beginPath();ctx.moveTo(sk*6,entry);ctx.lineTo(sk*6,15);ctx.stroke();
    }
    // live trench walls hugging the skis, flowing into the stamped ruts behind
    ctx.strokeStyle='rgba(78,102,126,'+(0.10+0.18*edgeI).toFixed(2)+')';ctx.lineWidth=1.15;
    ctx.beginPath();ctx.moveTo(-9.4,-14);ctx.lineTo(-9.4,11);ctx.moveTo(9.4,-14);ctx.lineTo(9.4,11);ctx.stroke();
  }
  ctx.fillStyle='#e33b3b';ctx.beginPath();ctx.arc(0,0,8.5,0,6.283);ctx.fill();
  ctx.fillStyle='#f3dcc0';ctx.beginPath();ctx.arc(0,-9,4,0,6.283);ctx.fill();
  ctx.fillStyle='#2a72c8';ctx.beginPath();ctx.arc(0,-11,4,Math.PI,0);ctx.fill();
  if(S.powK>0.10||S.sink>0.08){
    const bury=clamp(0.26+1.12*S.sink+0.42*S.powK,0,1.28);
    for(const sk of[-1,1]){
      ctx.fillStyle=`rgba(${snowC[0]|0},${snowC[1]|0},${snowC[2]|0},${(0.12+0.18*bury).toFixed(3)})`;
      ctx.beginPath();ctx.ellipse(sk*5.8,10+6*bury,8.2+6.2*bury,3.5+2.9*bury,sk*0.15,0,6.283);ctx.fill();
      ctx.fillStyle=`rgba(255,255,255,${(0.03+0.05*bury).toFixed(3)})`;
      ctx.beginPath();ctx.ellipse(sk*4.7,7+4*bury,4.8+3.5*bury,2.0+1.3*bury,sk*0.10,0,6.283);ctx.fill();
    }
  }
  ctx.restore();ctx.globalAlpha=1;
}
function drawYetiBody(x,y,sc,sy,eat,red,nightK){
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc*sy);
  ctx.fillStyle='#0c1017';
  // torso silhouette with belly zigzag
  ctx.beginPath();
  ctx.moveTo(-36,26);
  ctx.quadraticCurveTo(-46,-8,-30,-24);   // left shoulder rise
  ctx.quadraticCurveTo(-14,-36,0,-32);    // over the sunken head area
  ctx.quadraticCurveTo(16,-38,32,-22);    // right shoulder (taller)
  ctx.quadraticCurveTo(46,-6,36,26);
  // belly zigzag fur
  for(let i=0;i<6;i++){const fx=36-i*12;ctx.lineTo(fx-6,26+(i%2?0:8));}
  ctx.closePath();ctx.fill();
  // shoulder fur spikes
  ctx.beginPath();
  for(const s of[[-30,-24],[-18,-31],[20,-32],[31,-23]]){
    ctx.moveTo(s[0],s[1]);ctx.lineTo(s[0]+4,s[1]-9);ctx.lineTo(s[0]+8,s[1]);}
  ctx.fill();
  // head sunk between shoulders + brow
  ctx.beginPath();ctx.arc(0,-30,13,0,6.283);ctx.fill();
  ctx.fillRect(-11,-38,22,5);
  // arms swing
  const t=S.time;
  ctx.strokeStyle='#0c1017';ctx.lineWidth=11;ctx.lineCap='round';
  for(const sd of[-1,1]){
    const hx=sd*42,hy=24+Math.sin(t*7+sd*2)*7;
    ctx.beginPath();ctx.moveTo(sd*26,-16);ctx.quadraticCurveTo(sd*40,4,hx,hy);ctx.stroke();
    ctx.lineWidth=3.5;
    for(let c=-1;c<=1;c++){ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(hx+c*5,hy+9);ctx.stroke();}
    ctx.lineWidth=11;
  }
  // eyes
  const bright=0.75+0.25*nightK,fk=red?1:S.yeti.fury;
  ctx.fillStyle=`rgba(${(130+125*fk)|0},${(220-175*fk)|0},${(255-225*fk)|0},${bright})`;
  ctx.beginPath();ctx.arc(-5,-31,2.6,0,6.283);ctx.arc(5,-31,2.6,0,6.283);ctx.fill();
  // feast flecks
  if(eat>0){ctx.fillStyle='rgba(220,30,20,0.8)';
    for(let i=0;i<3;i++){ctx.beginPath();
      ctx.arc((Math.sin(t*9+i*2))*14,32+Math.sin(t*13+i)*4,2.4,0,6.283);ctx.fill();}}
  // breath puff
  if(Math.sin(t*(7+S.yeti.fury*5+(S.yeti.tired>0?4:0)))>0.92){ctx.fillStyle='rgba(230,240,255,0.35)';
    ctx.beginPath();ctx.arc(0,-18,6+Math.random()*3,0,6.283);ctx.fill();}
  // feet snow
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();ctx.ellipse(0,34,26,5,0,0,6.283);ctx.fill();
  ctx.restore();
}
/* ==================== DEFORMABLE SNOW (the pottery layer) ====================
   A persistent world-space canvas the skis cut into. Player contacts draw continuous
   directional trenches and berms; compact actors still stamp footprints. The
   window scrolls with the world; blizzards heal the marks. Composited through
   the 3D projection as 24 linear strips (mode-7 style). Half resolution. */
const DEF=(()=>{
  const DR=0.5, WIN_UP=-56, WIN_DN=56, H=Math.ceil((WIN_DN-WIN_UP)*PXM*DR), W=Math.ceil(LW*DR);
  let cvA=null,cvB=null,dctx=null,ctxA=null,ctxB=null,front=0,anchor=0,healAcc=0,on=false;
  const stamps={};
  function mkStamp(rgb){try{const c=document.createElement('canvas');c.width=32;c.height=32;
    const g=c.getContext('2d');if(!g)return null;
    const rg=g.createRadialGradient(16,16,1,16,16,16);
    rg.addColorStop(0,'rgba('+rgb+',1)');rg.addColorStop(0.55,'rgba('+rgb+',0.55)');rg.addColorStop(1,'rgba('+rgb+',0)');
    g.fillStyle=rg;g.fillRect(0,0,32,32);return c;}catch(e){return null;}}
  function init(){try{
    cvA=document.createElement('canvas');cvA.width=W;cvA.height=H;
    cvB=document.createElement('canvas');cvB.width=W;cvB.height=H;
    ctxA=cvA.getContext('2d');ctxB=cvB.getContext('2d');
    if(!ctxA||!ctxB){on=false;return;}
    dctx=ctxA;front=0;
    stamps.dark=mkStamp('26,36,58');stamps.lip=mkStamp('255,255,255');
    on=!!(stamps.dark&&stamps.lip);}catch(e){on=false;}}
  const frontCv=()=>front===0?cvA:cvB;
  function reset(){if(!on)return;anchor=S.depth+WIN_UP;healAcc=0;
    try{ctxA.clearRect(0,0,W,H);ctxB.clearRect(0,0,W,H);}catch(e){}}
  function tick(dt){
    if(!on)return;
    const wantTop=S.depth+WIN_UP;
    const dy=Math.floor((wantTop-anchor)*PXM*DR);
    if(dy>0){
      try{ // double-buffered scroll: never draw a canvas onto itself (iOS smears)
        const src=frontCv(),dst=front===0?ctxB:ctxA;
        dst.clearRect(0,0,W,H);
        if(dy<H)dst.drawImage(src,0,-dy);
        front=1-front;dctx=front===0?ctxA:ctxB;
      }catch(e){}
      anchor+=dy/(PXM*DR);
    }
    healAcc+=(M.snow?0.55:0.08)*dt; // fresh snowfall softens history; storms erase it
    if(healAcc>0.02){const a=Math.min(0.25,healAcc);healAcc=0;
      try{dctx.globalCompositeOperation='destination-out';
      dctx.fillStyle='rgba(0,0,0,'+a.toFixed(3)+')';dctx.fillRect(0,0,W,H);
      dctx.globalCompositeOperation='source-over';}catch(e){}}
  }
  function stamp(kind,x,d,r,a){
    if(!on||!stamps[kind])return;
    const sx=x*DR,sy=(d-anchor)*PXM*DR,rr=Math.max(1.2,r*DR);
    if(sy<-rr||sy>H+rr||sx<-rr||sx>W+rr)return;
    try{dctx.globalAlpha=Math.min(1,a);
    dctx.drawImage(stamps[kind],sx-rr,sy-rr,rr*2,rr*2);
    dctx.globalAlpha=1;}catch(e){}
  }
  function draw(){
    if(!on)return;
    const N=PerfBudget.profile().defStrips;
    const lo=Math.max(UTOP,anchor-S.depth),hi=Math.min(UBOT,anchor-S.depth+(WIN_DN-WIN_UP));
    if(hi<=lo)return;
    for(let i=0;i<N;i++){
      const ua=lo+(hi-lo)*i/N,ub=lo+(hi-lo)*(i+1)/N;
      const ya=PIN_Y+PXM*ua*(CZ/(CZ-ua)),yb=PIN_Y+PXM*ub*(CZ/(CZ-ub));
      const sMid=CZ/(CZ-(ua+ub)/2);
      const sy=(S.depth+ua-anchor)*PXM*DR,sh=(ub-ua)*PXM*DR;
      if(sh<=0||yb<=ya+0.01)continue;
      try{ctx.drawImage(frontCv(),0,sy,W,sh,LW/2-(LW/2)*sMid,ya,LW*sMid,yb-ya);}catch(e){}
    }
  }
  function strokeSegment(rgb,x0,d0,x1,d1,w,a){
    if(!on||a<=0)return;
    const ax=x0*DR,ay=(d0-anchor)*PXM*DR,bx=x1*DR,by=(d1-anchor)*PXM*DR;
    if((ay<-w&&by<-w)||(ay>H+w&&by>H+w))return;
    try{dctx.strokeStyle='rgba('+rgb+','+Math.min(1,a).toFixed(3)+')';
      dctx.lineWidth=Math.max(0.7,w*DR);dctx.lineCap='round';dctx.lineJoin='round';
      dctx.beginPath();dctx.moveTo(ax,ay);dctx.lineTo(bx,by);dctx.stroke();}catch(e){}
  }
  function gougeSegment(x0,d0,x1,d1,r,a,outside){
    if(!on)return;
    const out=outside||1;
    // soft compressed bed, then a narrow cut, then material displaced to the outside edge
    strokeSegment('114,132,152',x0,d0,x1,d1,r*1.95,a*0.08);
    strokeSegment('84,102,122',x0,d0,x1,d1,r*0.72,a*0.34);
    strokeSegment('255,255,255',x0+out*r*0.82,d0-0.04,x1+out*r*0.82,d1-0.04,r*0.92,a*0.76);
    strokeSegment('245,250,255',x0-out*r*0.22,d0-0.02,x1-out*r*0.22,d1-0.02,r*0.24,a*0.05);
  }
  function gouge(x,d,r,a){ // compact actors still use a local embossed footprint
    stamp('lip',x-2.2,d-0.14,r,a*0.55);
    stamp('dark',x+0.8,d+0.05,r,a);
  }
  return{init,reset,tick,stamp,gouge,gougeSegment,draw,on:()=>on};
})();
DEF.init();
/* ============================ HUD ============================ */
function hud(){
  el.depth.innerHTML=Math.floor(S.depth)+'<small> m</small>';
  if(S.combo>0){
    el.combo.textContent=S.combo+'×';
    el.combo.style.color=S.combo>=15?'#ff9d3a':S.combo>=9?'#ffd76a':S.combo>=4?'#7fe6ff':'#ffffff';
    el.combo.style.transform='scale('+(1+S.comboPulse*0.35)+')';
  }else{el.combo.textContent='';}
}
const Rendering=Object.freeze({render,hud,palette,projD,deformation:DEF});
/* ====================== MODULE: INPUT ====================== */
let anchor=null;
const keys={};
function toLogical(e){const r=cv.getBoundingClientRect();return (e.clientX-r.left)/r.width*LW;}
function pdown(e){
  Audio.ac();
  if(S.mode==='intro'||S.mode==='dead')return;
  e.preventDefault();
  try{cv.setPointerCapture(e.pointerId);}catch(err){}
  anchor=toLogical(e);S.active=false;S.steer=0;
}
function pmove(e){
  if(anchor===null||S.mode!=='play')return;
  e.preventDefault();
  const x=toLogical(e);let dx=x-anchor;
  if(dx>C.touchFull){anchor=x-C.touchFull;dx=C.touchFull;}
  if(dx<-C.touchFull){anchor=x+C.touchFull;dx=-C.touchFull;}
  if(Math.abs(dx)<C.touchDZ){S.active=false;S.steer=0;}
  else{S.active=true;S.steer=clamp(dx/C.touchFull,-1,1);}
}
function pup(){anchor=null;S.active=false;S.steer=0;}
function kb(){
  const l=keys['ArrowLeft']||keys['a']||keys['A'],r=keys['ArrowRight']||keys['d']||keys['D'];
  if(l&&!r){S.active=true;S.steer=-1;}
  else if(r&&!l){S.active=true;S.steer=1;}
  else if(anchor===null){S.active=false;S.steer=0;}
}
function beginRun(){Generation.fresh();if(lastDeathReal)S.speed=17;
  $('btnRow').style.display='none';el.tune.classList.remove('show');
  S.mode='play';el.intro.classList.add('hide');el.results.classList.add('hide');Audio.ac();}
function bindInput(){
  cv.addEventListener('pointerdown',pdown);cv.addEventListener('pointermove',pmove);
  cv.addEventListener('pointerup',pup);cv.addEventListener('pointercancel',pup);
  document.addEventListener('touchmove',e=>{if(!el.tune.classList.contains('show'))e.preventDefault();},{passive:false});
  window.addEventListener('keydown',e=>{keys[e.key]=true;kb();});window.addEventListener('keyup',e=>{keys[e.key]=false;kb();});
  el.intro.addEventListener('pointerdown',e=>{e.preventDefault();Input.beginRun();});
  el.results.addEventListener('pointerdown',e=>{e.preventDefault();Input.beginRun();});
  $('lbWrap').addEventListener('pointerdown',e=>{e.stopPropagation();});
  $('lbGo').addEventListener('click',function(){const sc=parseInt(this.dataset.score||'0',10);
    if(Leaderboard.submit($('lbInit').value,sc)){$('lbEntry').style.display='none';lbStatus('sending…');renderBoard();}
    else{$('lbInit').value='';$('lbInit').placeholder='NOPE';}});
  $('lbInit').addEventListener('input',function(){this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'');});
  $('bTune').addEventListener('click',e=>{e.stopPropagation();el.tune.classList.toggle('show');});
  $('bDebug').addEventListener('click',e=>{e.stopPropagation();if(!PUBLIC_BUILD)debugOn=!debugOn;});
  $('bSound').addEventListener('click',function(e){e.stopPropagation();this.style.opacity=Audio.toggle()?'1':'0.4';});
}
const Input=Object.freeze({bind:bindInput,beginRun,pdown,pmove,pup,kb});
Input.bind();
Leaderboard.refresh();Leaderboard.drain();
/* tune sliders */
function slider(id,vid,fn,fmt){const s=$(id),v=$(vid);
  s.addEventListener('input',()=>{const val=parseFloat(s.value);fn(val);v.textContent=fmt?fmt(val):val;});}
slider('sReturn','vReturn',v=>C.returnRate=v*D2R);
slider('sTurn','vTurn',v=>C.turnRate=v*D2R);
slider('sFuel','vFuel',v=>C.flagFuel=v);
slider('sBleed','vBleed',v=>C.bleed=v,v=>v.toFixed(2));
slider('sYeti','vYeti',v=>C.yetiPressure=v,v=>v.toFixed(2));
slider('sObs','vObs',v=>C.obsMax=v);
/* ============================ RESIZE ============================ */
function resize(){
  const r=cv.getBoundingClientRect(),q=PerfBudget.profile();
  const dpr=Math.min(q.dpr,window.devicePixelRatio||1);
  VW=Math.max(1,Math.round(r.width*dpr));VH=Math.max(1,Math.round(r.height*dpr));
  cv.width=VW;cv.height=VH;SCL=VW/LW;
  LH=VH/SCL;PIN_Y=0.36*LH;
  UTOP=uOfz(-120,CZ);UBOT=uOfz(LH+100,CZ);
  stage.style.setProperty('--u',(r.width/LW)+'px');
}
window.addEventListener('resize',resize);
/* ============================ LOOP ============================ */
let last=0,fps=60,paused=false;
document.addEventListener('visibilitychange',()=>{paused=document.hidden;});
// visible error reporter: sandboxed consoles mask details as "Script error"
const errBox=document.createElement('div');
errBox.setAttribute('style','position:absolute;left:2%;right:2%;bottom:2%;z-index:99;display:none;'+
  'background:rgba(120,10,10,.92);color:#fff;font:12px/1.4 monospace;padding:8px 10px;border-radius:8px;'+
  'pointer-events:none;white-space:pre-wrap;word-break:break-all');
stage.appendChild(errBox);
let errN=0;
function reportErr(msg){errN++;errBox.textContent='ERR['+errN+'] '+msg;errBox.style.display='block';}
window.addEventListener('error',e=>reportErr((e.message||e.error||'?')+' @'+(e.lineno||'?')+':'+(e.colno||'?')));
window.addEventListener('unhandledrejection',e=>{reportErr('promise: '+((e.reason&&e.reason.message)||e.reason));if(e.preventDefault)e.preventDefault();});
const Modules=Object.freeze({
  persistence:Persistence,audio:Audio,leaderboard:Leaderboard,difficulty:Difficulty,generation:Generation,
  effects:Effects,simulation:Simulation,rendering:Rendering,input:Input,performance:PerfBudget
});
function frame(now){
  requestAnimationFrame(frame);
  const t=now/1000;let dt=Math.min(MAX_DT,t-last||0.016);last=t;
  if(dt>0)fps=lerp(fps,1/dt,0.05);
  if(paused)return;
  const workStart=performance.now();
  try{Modules.simulation.update(dt);Modules.rendering.render();}
  catch(err){reportErr((err&&err.message)+' | '+(((err&&err.stack)||'').split('\n')[1]||'').trim());}
  Modules.performance.noteFrame(performance.now()-workStart);
}
PerfBudget.init();
Generation.fresh();
resize();
requestAnimationFrame(frame);
/* ============================ TEST HOOK ============================ */
window.__EP={
  modules:Modules,begin:Input.beginRun,update:Simulation.update,render:Rendering.render,S:()=>S,C,M:()=>M,fresh:Generation.fresh,
  arrays:()=>({gates,obs,npcs,balls,markers,smears,spray,parts,snow}),
  lb:Leaderboard,def:DEF,difficulty:d=>Difficulty.profile(d),quality:()=>({level:PerfBudget.level,profile:PerfBudget.profile(),avgMs:PerfBudget.avg}),
  setQuality:n=>PerfBudget.setLevel(n),
  setSteer:v=>{S.active=v!==0;S.steer=clamp(v,-1,1);}
};
</script>
