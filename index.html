<style>

  #tunePanel{position:absolute;left:calc(16*var(--u));right:calc(16*var(--u));bottom:calc(84*var(--u));
    background:rgba(8,12,20,.92);border:1px solid rgba(255,255,255,.18);border-radius:calc(16*var(--u));

  #tunePanel label span.vl{width:calc(70*var(--u));text-align:right;font-variant-numeric:tabular-nums;color:#8fd8ff}
  #tunePanel input[type=range]{flex:1;accent-color:#5fd8ff}
  .ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 35%,rgba(20,32,52,.55),rgba(4,6,10,.86));color:#fff;text-align:center;
    pointer-events:auto;opacity:1;transition:opacity .25s}
  .ov.hide{opacity:0;pointer-events:none}
  .ov h1{font-size:calc(66*var(--u));font-weight:900;letter-spacing:.04em;margin:0 0 calc(8*var(--u));
    text-shadow:0 calc(4*var(--u)) calc(18*var(--u)) rgba(90,180,255,.35)}
  .ov .sub{font-size:calc(26*var(--u));opacity:.85;max-width:80%;line-height:1.5}
  .ov .tag{margin-top:calc(6*var(--u));font-size:calc(24*var(--u));color:#ff9a8a;font-weight:700}

  .ov .best{font-size:calc(24*var(--u));opacity:.75;margin-top:calc(4*var(--u))}

  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  #rStrip{position:relative;width:64%;height:calc(9*var(--u));margin-top:calc(26*var(--u));
    background:rgba(255,255,255,.14);border-radius:calc(5*var(--u))}
  #rStrip i{position:absolute;top:calc(-5*var(--u));width:calc(5*var(--u));height:calc(19*var(--u));border-radius:calc(2*var(--u))}
  #tYou{background:#ff6a5e}#tBest{background:#ffd76a}
  #rNew{margin-top:calc(14*var(--u));font-size:calc(30*var(--u));font-weight:900;letter-spacing:.2em;

  #lbWrap{margin-top:calc(20*var(--u));width:72%;pointer-events:auto}

    background:#8fd8ff;border:none;border-radius:calc(10*var(--u));padding:0 calc(18*var(--u))}
  .lbRow{display:flex;align-items:center;gap:calc(12*var(--u));font-size:calc(22*var(--u));
    padding:calc(3*var(--u)) 0;font-variant-numeric:tabular-nums}

<body>
<div id="wrap"><div id="stage">
  <canvas id="cv"></canvas>

    <label><span class="nm">Return to center</span><input type="range" id="sReturn" min="0" max="260" step="5" value="170"><span class="vl" id="vReturn">170</span></label>

</div></div>
<script>
'use strict';
/* ============================ CONSTANTS ============================ */
const LW=720, LH=1280, PXM=16, PIN_Y=0.36*LH, EDGE=40, PR=12, MAX_DT=0.05;
const D2R=Math.PI/180;
const C={
  thetaMax:62*D2R, turnRate:240*D2R, returnRate:170*D2R,
  touchDZ:12, touchFull:155, steerLerp:28,
  glide:10.8, speedMax:40, bleed:0.40, flagFuel:7, fuelPerCombo:0.35, comboFuelCap:12, poolCap:26, fuelRate:15,
  crashCut:0.45, faultCut:0.82,
  stun:0.45, iframe:0.55, forgive:0.62, hitstop:0.12,
  chunk:22, ahead:108,
  corStart:300, corMin:148, corShrink:0.05,
  gateChance:0.68,
  obsMax:7,
  yetiGrace:30, yetiStart:42, yetiBase:10, yetiRamp:0.013, yetiXL:1.6, SAFE:30,
  lungeMin:6, lungeMax:10, teleT:0.6, lungeT:0.4, lungeBoost:16,
  feast:1.7, killCam:0.6, edgeCam:0.45,
  furyCrash:0.35, furyFault:0.12, furyStreakW:0.4, furyCalm:0.34, furyDecay:0.02,
  furySpeed:0.15, furyLunge:0.45, sprint:8, sprintFury:4, rest:4, restFury:1.8, tiredMul:0.75,
  passFirst:130, passMin:25, passSpan:20,
  grabR:46, whiffBack:7, whiffFury:0.25, whiffStag:0.8,
  lungeMissBack:3, lungeMissFury:0.1, lungeMissStag:0.5,
  npcChance:0.22, boulderAfter:240, boulderRate:0.045,
  phaseMin:230, phaseMax:320,
  markerCap:180, SEED:1337
};
/* ============================ HELPERS ============================ */
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,k)=>a+(b-a)*k;
const hshG=n=>{const x=Math.sin(n*127.1)*43758.5453;return x-Math.floor(x);};
function powderAt(x,d){ // deterministic deep-powder patches on the seeded mountain
  const cs=90;let k=0;const ci0=Math.floor(d/cs);
  for(let ci=ci0-1;ci<=ci0+1;ci++){
    if(hshG(ci*7.13)<0.42)continue;
    const cx=EDGE+60+hshG(ci*3.7)*(LW-2*EDGE-120);
    const cd=(ci+0.5)*cs+(hshG(ci*9.1)-0.5)*40;
    const rx=120+hshG(ci*5.3)*140,rd=28+hshG(ci*2.9)*26;
    const q=((x-cx)/rx)*((x-cx)/rx)+((d-cd)/rd)*((d-cd)/rd);
    if(q<1)k=Math.max(k,1-q);
  }
  return k;
}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
const store=(()=>{try{const k='__ep_t',s=window.localStorage;s.setItem(k,'1');s.removeItem(k);return s;}
  catch(e){const m={};return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v);},removeItem:k=>{delete m[k];}};}})();
const vib=ms=>{try{if(navigator&&navigator.vibrate)navigator.vibrate(ms);}catch(e){}};
const $=id=>document.getElementById(id);
/* ============================ DOM ============================ */
const cv=$('cv'), stage=$('stage');
const ctx=cv.getContext('2d');
const el={depth:$('hDepth'),combo:$('hCombo'),
  intro:$('ovIntro'),results:$('ovResults'),rTitle:$('rTitle'),rTag:$('rTag'),rDist:$('rDist'),rBest:$('rBest'),
  tune:$('tunePanel')};
/* ============================ AUDIO ============================ */
let AC=null, sndOn=store.getItem('ep_snd')!=='0';
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state==='suspended'){try{const p=AC.resume();if(p&&p.catch)p.catch(()=>{});}catch(e){}} return AC;}
function tone(f0,f1,dur,type,gain){const a=sndOn&&ac();if(!a)return;
  try{const o=a.createOscillator(),g=a.createGain(),t=a.currentTime;
  o.type=type;o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),t+dur);
  g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+.02);}catch(e){}}
let hiss=null;
function ensureHiss(){const a=AC;if(!a||hiss)return;
  try{const len=a.sampleRate|0,buf=a.createBuffer(1,len,a.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  // edge hiss (bandpass)
  const src=a.createBufferSource();src.buffer=buf;src.loop=true;
  const bp=a.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1600;bp.Q.value=0.8;
  const g=a.createGain();g.gain.value=0;
  src.connect(bp);bp.connect(g);g.connect(a.destination);src.start();
  // body rumble + deep-powder whoosh (lowpass)
  const src2=a.createBufferSource();src2.buffer=buf;src2.loop=true;
  const lp=a.createBiquadFilter();lp.type='lowpass';lp.frequency.value=220;
  const g2=a.createGain();g2.gain.value=0;
  src2.connect(lp);lp.connect(g2);g2.connect(a.destination);src2.start();
  hiss={g,bp,g2,buf};}catch(e){hiss=null;}}
function crunch(vol){ // one grain of snow crust giving way
  const a=AC;if(!a||!sndOn||!hiss||!hiss.buf)return;
  try{const src=a.createBufferSource();src.buffer=hiss.buf;
    src.playbackRate.value=0.7+Math.random()*0.9;
    const bp=a.createBiquadFilter();bp.type='bandpass';
    bp.frequency.value=500+Math.random()*2500;bp.Q.value=1.2;
    const g=a.createGain(),t=a.currentTime;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    src.connect(bp);bp.connect(g);g.connect(a.destination);
    src.start(t,Math.random()*0.5,0.06);src.stop(t+0.07);}catch(e){}}
const sfx={
  gate:c=>tone(740+Math.min(c,20)*36,(740+Math.min(c,20)*36)*1.5,0.14,'triangle',0.22),
  miss:()=>tone(300,180,0.16,'square',0.16),
  crash:()=>{tone(160,60,0.28,'sawtooth',0.3);tone(90,40,0.34,'square',0.22);},
  roar:()=>{tone(120,55,0.55,'sawtooth',0.4);tone(70,40,0.6,'square',0.2);},
  growl:()=>tone(85,60,0.32,'sawtooth',0.25),
  phase:()=>{tone(520,780,0.22,'triangle',0.18);},
  eat:()=>tone(140,70,0.3,'square',0.2)
};
/* ============================ PHASES ============================ */
function baseM(){return{bleed:1,fuel:1,obs:1,yeti:1,npc:1,turn:1,alt:false,snow:false};}
let M=baseM();
const PHASES=[
  {n:'CLEAR SKIES',w:2,f:m=>{}},
  {n:'BLIZZARD',w:1,f:m=>{m.turn=0.72;m.bleed=0.6;m.snow=true;}},
  {n:'RUSH HOUR',w:1,f:m=>{m.npc=2.4;}},
  {n:'DEEP WOODS',w:1,f:m=>{m.obs=1.6;m.fuel=1.3;}},
  {n:'SWITCHBACK',w:1,f:m=>{m.alt=true;m.fuel=1.3;}},
  {n:'HUNGRY',w:1,f:m=>{m.yeti=1.22;m.fuel=1.5;}}
];
/* ==================== ONLINE LEADERBOARD (Firebase RTDB REST) ====================
   Ported from JumpOvertheMoon's HighScoreService. Set FIREBASE_DB_URL to enable —
   leave empty and the feature hides itself entirely. No SDK: plain REST + fetch. */
let FIREBASE_DB_URL='https://endless-powder-default-rtdb.firebaseio.com';
const LB_PATH='/endless_powder/scores', LB_SIZE=10, LB_REFRESH=30000;
const LB_BAD=/^(ASS|FUK|FUC|FCK|SHT|SHI|DIK|DIQ|DIC|COK|COC|CUM|FAG|FAT|GAY|GOD|JEW|KKK|NIG|NGA|NGR|PIS|POO|SEX|TIT|TTS|WTF|STF|SUK|SUC|VAG|WOP|KYS|RAP|FKU|CNT|CUN|HOR|HO3|ANU|ANL|BUT|BUM|DAM|DMN|HEL|JIZ|KIK|PEN|PHK|SCK|SLT|SMD)$/;
const LB=(()=>{
  let cache={initials:'AAA',top:[],pending:[]};
  try{const c=JSON.parse(store.getItem('ep_lb')||'{}');if(c&&typeof c==='object')cache=Object.assign(cache,c);}catch(e){}
  let lastRefresh=0,busy=false,lastSub=null;
  const on=()=>!!FIREBASE_DB_URL&&typeof fetch==='function';
  const save=()=>{try{store.setItem('ep_lb',JSON.stringify({initials:cache.initials,top:cache.top,pending:cache.pending.slice(-20)}));}catch(e){}};
  const sanit=v=>{const c=String(v||'').toUpperCase().replace(/[^A-Z0-9]/g,'');return (c||'AAA').slice(0,3).padEnd(3,'A');};
  const norm=p=>{
    const raw=p&&typeof p==='object'?Object.values(p):[];
    return raw.filter(e=>e&&typeof e==='object')
      .map(e=>({initials:sanit(e.initials),score:Math.max(0,Math.min(999999,Math.floor(+e.score||0))),timestamp:Math.floor(+e.timestamp||0)}))
      .sort((a,b)=>b.score-a.score||a.timestamp-b.timestamp).slice(0,LB_SIZE);
  };
  async function refresh(force){
    if(!on())return;
    if(!force&&Date.now()-lastRefresh<LB_REFRESH)return;
    lastRefresh=Date.now();
    try{
      const r=await fetch(FIREBASE_DB_URL+LB_PATH+'.json?orderBy=%22score%22&limitToLast='+LB_SIZE);
      if(r.ok){cache.top=norm(await r.json());save();renderBoard();lbStatus('');}
      else lbStatus('board unreachable ('+r.status+') — check database rules');
    }catch(e){lbStatus('board offline');}
  }
  async function drain(){ // pending queue survives offline deaths and drains later
    if(!on()||busy)return;busy=true;
    try{
      while(cache.pending.length){
        const e=cache.pending[0];
        const r=await fetch(FIREBASE_DB_URL+LB_PATH+'.json',
          {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(e)});
        if(!r.ok){lbStatus('submit blocked ('+r.status+') — will retry; check database rules');break;}
        cache.pending.shift();save();
      }
    }catch(e){lbStatus('submit queued — offline, will retry');}
    busy=false;
    if(!cache.pending.length)refresh(true);
  }
  const qualifies=score=>on()&&(cache.top.length<LB_SIZE||score>cache.top[cache.top.length-1].score);
  function submit(initials,score){
    initials=sanit(initials);
    if(LB_BAD.test(initials))return false; // server enforces too; this avoids a doomed write
    cache.initials=initials;
    const entry={initials,score:Math.max(0,Math.min(999999,Math.floor(score))),timestamp:Date.now()};
    lastSub=entry;
    cache.pending.push(entry);cache.pending=cache.pending.slice(-20);
    save();drain();return true;
  }
  return{on,refresh,drain,qualifies,submit,sanit,cache:()=>cache,lastSub:()=>lastSub,
    _setUrl:u=>{FIREBASE_DB_URL=u;}};
})();
function lbStatus(msg){const e=$('lbStatus');if(e)e.textContent=msg||'';}
function renderBoard(){
  const list=$('lbList');if(!list)return;
  const top=LB.cache().top,ls=LB.lastSub();
  if(!top.length){list.innerHTML='';return;}
  list.innerHTML=top.map((e,i)=>{
    const mine=ls&&e.initials===ls.initials&&e.score===ls.score;
    return '<div class="lbRow'+(mine?' mine':'')+'"><span>'+(i+1)+'</span><b>'+e.initials+'</b><i>'+e.score+' m</i></div>';
  }).join('');
}
/* ============================ PERSISTENCE ============================ */
let markers=[];try{markers=JSON.parse(store.getItem('ep_markers')||'[]')||[];}catch(e){markers=[];}
let best=parseFloat(store.getItem('ep_best')||'0')||0;
let lastDeathReal=0;
function addMarker(t,d,x){markers.push({t,d:Math.round(d*10)/10,x:Math.round(x)});
  if(markers.length>C.markerCap)markers.splice(0,markers.length-C.markerCap);
  try{store.setItem('ep_markers',JSON.stringify(markers));}catch(e){}}
/* ============================ STATE ============================ */
let R=mulberry32(C.SEED), S=null;
let gates=[],obs=[],npcs=[],edgeT=[],balls=[],parts=[],spray=[],floaters=[],snow=[],rings=[],corDbg=[],smears=[];
let debugOn=false;
function fresh(){
  R=mulberry32(C.SEED);
  gates.length=0;obs.length=0;npcs.length=0;edgeT.length=0;balls.length=0;
  parts.length=0;spray.length=0;floaters.length=0;snow.length=0;rings.length=0;corDbg.length=0;smears.length=0;
  M=baseM();
  let summit=250;
  try{const r=JSON.parse(store.getItem('ep_recent')||'[]')||[];
    if(r.length>=3){const avg=r.reduce((a,b)=>a+b,0)/r.length;
      summit=clamp(350-(avg-150)/650*200,150,350);}}catch(e){}
  S={mode:'intro',summit,slowmo:0,time:0,depth:0,x:LW/2,prevD:0,prevX:LW/2,theta:0,speed:14,fuel:0,combo:0,comboPulse:0,

      let need=clamp(x+sd*(PR+8),EDGE+95,LW-EDGE-95);

      // Lateral travel ≈ 11 px per meter of descent after an 8m reaction allowance

      if(S.lastFlagX!==null){

function edgeGlow(x,dir,k){

function drawYetiLayer(nightK){

  if(prox>0.02){const fr=ctx.createLinearGradient(0,0,0,LH*0.4);
    fr.addColorStop(0,'rgba(190,225,255,'+(0.55*prox)+')');fr.addColorStop(1,'rgba(190,225,255,0)');
    ctx.fillStyle=fr;ctx.fillRect(-30,-30,LW+60,LH*0.4+30);}
  if(S.mode==='dying'&&S.cause==='caught')return;
  if(Y.tele>0){ // snow-ripple at the committed lunge aim: the dodge is readable
    const k=1-Y.tele/C.teleT,ap=projD(Y.aimX,0);
    for(let i=0;i<2;i++){const kk=(k+i*0.5)%1;
      ctx.strokeStyle='rgba(200,225,255,'+(0.35*(1-kk))+')';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(ap.x,ap.y,10+kk*44,0,6.283);ctx.stroke();}}

  const scale=[0.98,1.14,1.34][Y.st];

  else if(Y.burst>0){sy=1.14;eyesRed=true;}

    ctx.beginPath();ctx.arc(-3,-s*0.6,1.8,0,6.283);ctx.arc(3,-s*0.6,1.8,0,6.283);ctx.fill();}

function drawNPC(n){
  if(n.down>0){ctx.save();ctx.rotate(n.down*9);ctx.strokeStyle='#ff9a3a';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(-9,-9);ctx.lineTo(9,9);ctx.moveTo(9,-9);ctx.lineTo(-9,9);ctx.stroke();ctx.restore();return;}
  ctx.save();
  const tilt=clamp(n.vx/220,-0.6,0.6);ctx.rotate(-tilt*0.6);
  ctx.strokeStyle='rgba(58,42,28,0.25)';ctx.lineWidth=4;ctx.lineCap='round'; // buried tails: faint
  ctx.beginPath();ctx.moveTo(-6,-13);ctx.lineTo(-6,-3);ctx.moveTo(6,-13);ctx.lineTo(6,-3);ctx.stroke();
  ctx.strokeStyle='#3a2a1c';ctx.lineWidth=4; // exposed fronts: solid
  ctx.beginPath();ctx.moveTo(-6,-3);ctx.lineTo(-6,13);ctx.moveTo(6,-3);ctx.lineTo(6,13);ctx.stroke();
  ctx.fillStyle='#6b4a2e';ctx.beginPath();ctx.arc(0,0,8,0,6.283);ctx.fill();
  ctx.strokeStyle='#ff8c2e';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(-5,2);ctx.lineTo(0,-3);ctx.lineTo(5,2);ctx.stroke();
  ctx.fillStyle='#e8d2b8';ctx.beginPath();ctx.arc(0,-8,3.6,0,6.283);ctx.fill();
  ctx.restore();
}
function drawPlayer(){
  const y=PIN_Y;
  ctx.save();ctx.translate(S.x,y);
  const ab=Math.min(1,Math.abs(S.bank)/C.thetaMax);
  ctx.scale(1.28*(1+ab*0.08),1.28*(1-ab*0.11));
  if(S.stun>0){ctx.rotate(S.time*14);ctx.strokeStyle='#ff4a3a';ctx.lineWidth=6;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-11,-11);ctx.lineTo(11,11);ctx.moveTo(11,-11);ctx.lineTo(-11,11);ctx.stroke();
    ctx.restore();return;}
  if(S.combo>=4){ // chain aura: see your combo burning
    const hr=heatRGB(),k=Math.min(S.combo,20)/20,rad=22+k*10+S.comboPulse*10;
    const ag=ctx.createRadialGradient(0,0,3,0,0,rad);
    ag.addColorStop(0,'rgba('+hr+','+(0.22+0.1*k)+')');ag.addColorStop(1,'rgba('+hr+',0)');
    ctx.fillStyle=ag;ctx.beginPath();ctx.arc(0,0,rad,0,6.283);ctx.fill();
  }
  if(S.iframe>0&&Math.sin(S.time*40)>0)ctx.globalAlpha=0.45;
  ctx.rotate(-S.bank);
  { // IMMERSION as absence: buried ski simply isn't visible. Works in every palette.
    const sink=S.sink,edgeI=Math.abs(Math.sin(S.theta)),tdir=Math.sign(S.theta)||0;
    ctx.lineCap='round';
    for(const sk of[-1,1]){
      const skSink=sink<0.04?0:Math.min(0.98,sink*(sk===tdir&&tdir!==0?1.25:tdir!==0?0.8:1));
      const entry=-15+27*skSink; // where the ski meets the surface; tips stay clear
      // buried portion: a faint ghost through the snow
      if(skSink>0){ctx.strokeStyle='rgba(28,40,54,0.22)';ctx.lineWidth=4.5;
        ctx.beginPath();ctx.moveTo(sk*6,-15);ctx.lineTo(sk*6,entry);ctx.stroke();}
      // exposed portion: solid
      ctx.strokeStyle='#1c2836';ctx.lineWidth=4.5;
      ctx.beginPath();ctx.moveTo(sk*6,entry);ctx.lineTo(sk*6,15);ctx.stroke();
    }
    // live trench walls hugging the skis, flowing into the stamped ruts behind
    ctx.strokeStyle='rgba(20,30,50,'+(0.18+0.3*edgeI).toFixed(2)+')';ctx.lineWidth=1.3;
    ctx.beginPath();ctx.moveTo(-9.4,-14);ctx.lineTo(-9.4,11);ctx.moveTo(9.4,-14);ctx.lineTo(9.4,11);ctx.stroke();
  }
  ctx.fillStyle='#e33b3b';ctx.beginPath();ctx.arc(0,0,8.5,0,6.283);ctx.fill();
  ctx.fillStyle='#f3dcc0';ctx.beginPath();ctx.arc(0,-9,4,0,6.283);ctx.fill();
  ctx.fillStyle='#2a72c8';ctx.beginPath();ctx.arc(0,-11,4,Math.PI,0);ctx.fill();
  ctx.restore();ctx.globalAlpha=1;
}
function drawYetiBody(x,y,sc,sy,eat,red,nightK){
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc*sy);
  ctx.fillStyle='#0c1017';
  // torso silhouette with belly zigzag
  ctx.beginPath();
  ctx.moveTo(-36,26);
  ctx.quadraticCurveTo(-46,-8,-30,-24);   // left shoulder rise
  ctx.quadraticCurveTo(-14,-36,0,-32);    // over the sunken head area
  ctx.quadraticCurveTo(16,-38,32,-22);    // right shoulder (taller)
  ctx.quadraticCurveTo(46,-6,36,26);
  // belly zigzag fur
  for(let i=0;i<6;i++){const fx=36-i*12;ctx.lineTo(fx-6,26+(i%2?0:8));}
  ctx.closePath();ctx.fill();
  // shoulder fur spikes
  ctx.beginPath();
  for(const s of[[-30,-24],[-18,-31],[20,-32],[31,-23]]){
    ctx.moveTo(s[0],s[1]);ctx.lineTo(s[0]+4,s[1]-9);ctx.lineTo(s[0]+8,s[1]);}
  ctx.fill();
  // head sunk between shoulders + brow
  ctx.beginPath();ctx.arc(0,-30,13,0,6.283);ctx.fill();
  ctx.fillRect(-11,-38,22,5);
  // arms swing
  const t=S.time;
  ctx.strokeStyle='#0c1017';ctx.lineWidth=11;ctx.lineCap='round';
  for(const sd of[-1,1]){
    const hx=sd*42,hy=24+Math.sin(t*7+sd*2)*7;
    ctx.beginPath();ctx.moveTo(sd*26,-16);ctx.quadraticCurveTo(sd*40,4,hx,hy);ctx.stroke();
    ctx.lineWidth=3.5;
    for(let c=-1;c<=1;c++){ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(hx+c*5,hy+9);ctx.stroke();}
    ctx.lineWidth=11;
  }
  // eyes
  const bright=0.75+0.25*nightK,fk=red?1:S.yeti.fury;
  ctx.fillStyle=`rgba(${(130+125*fk)|0},${(220-175*fk)|0},${(255-225*fk)|0},${bright})`;
  ctx.beginPath();ctx.arc(-5,-31,2.6,0,6.283);ctx.arc(5,-31,2.6,0,6.283);ctx.fill();
  // feast flecks
  if(eat>0){ctx.fillStyle='rgba(220,30,20,0.8)';
    for(let i=0;i<3;i++){ctx.beginPath();
      ctx.arc((Math.sin(t*9+i*2))*14,32+Math.sin(t*13+i)*4,2.4,0,6.283);ctx.fill();}}
  // breath puff
  if(Math.sin(t*(7+S.yeti.fury*5+(S.yeti.tired>0?4:0)))>0.92){ctx.fillStyle='rgba(230,240,255,0.35)';
    ctx.beginPath();ctx.arc(0,-18,6+Math.random()*3,0,6.283);ctx.fill();}
  // feet snow
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();ctx.ellipse(0,34,26,5,0,0,6.283);ctx.fill();
  ctx.restore();
}
/* ==================== DEFORMABLE SNOW (the pottery layer) ====================
   A persistent world-space canvas the skis gouge into. Stamps accumulate; the
   window scrolls with the world; blizzards heal the marks. Composited through
   the 3D projection as 24 linear strips (mode-7 style). Half resolution. */
const DEF=(()=>{
  const DR=0.5, WIN_UP=-56, WIN_DN=56, H=Math.ceil((WIN_DN-WIN_UP)*PXM*DR), W=Math.ceil(LW*DR);
  let cvA=null,cvB=null,dctx=null,ctxA=null,ctxB=null,front=0,anchor=0,healAcc=0,on=false;
  const stamps={};
  function mkStamp(rgb){try{const c=document.createElement('canvas');c.width=32;c.height=32;
    const g=c.getContext('2d');if(!g)return null;
    const rg=g.createRadialGradient(16,16,1,16,16,16);
    rg.addColorStop(0,'rgba('+rgb+',1)');rg.addColorStop(0.55,'rgba('+rgb+',0.55)');rg.addColorStop(1,'rgba('+rgb+',0)');
    g.fillStyle=rg;g.fillRect(0,0,32,32);return c;}catch(e){return null;}}
  function init(){try{
    cvA=document.createElement('canvas');cvA.width=W;cvA.height=H;
    cvB=document.createElement('canvas');cvB.width=W;cvB.height=H;
    ctxA=cvA.getContext('2d');ctxB=cvB.getContext('2d');
    if(!ctxA||!ctxB){on=false;return;}
    dctx=ctxA;front=0;
    stamps.dark=mkStamp('26,36,58');stamps.lip=mkStamp('255,255,255');
    on=!!(stamps.dark&&stamps.lip);}catch(e){on=false;}}
  const frontCv=()=>front===0?cvA:cvB;
  function reset(){if(!on)return;anchor=S.depth+WIN_UP;healAcc=0;
    try{ctxA.clearRect(0,0,W,H);ctxB.clearRect(0,0,W,H);}catch(e){}}
  function tick(dt){
    if(!on)return;
    const wantTop=S.depth+WIN_UP;
    const dy=Math.floor((wantTop-anchor)*PXM*DR);
    if(dy>0){
      try{ // double-buffered scroll: never draw a canvas onto itself (iOS smears)
        const src=frontCv(),dst=front===0?ctxB:ctxA;
        dst.clearRect(0,0,W,H);
        if(dy<H)dst.drawImage(src,0,-dy);
        front=1-front;dctx=front===0?ctxA:ctxB;
      }catch(e){}
      anchor+=dy/(PXM*DR);
    }
    healAcc+=(M.snow?0.5:0.05)*dt; // fresh snowfall softens history; storms erase it
    if(healAcc>0.02){const a=Math.min(0.25,healAcc);healAcc=0;
      try{dctx.globalCompositeOperation='destination-out';
      dctx.fillStyle='rgba(0,0,0,'+a.toFixed(3)+')';dctx.fillRect(0,0,W,H);
      dctx.globalCompositeOperation='source-over';}catch(e){}}
  }
  function stamp(kind,x,d,r,a){
    if(!on||!stamps[kind])return;
    const sx=x*DR,sy=(d-anchor)*PXM*DR,rr=Math.max(1.2,r*DR);
    if(sy<-rr||sy>H+rr||sx<-rr||sx>W+rr)return;
    try{dctx.globalAlpha=Math.min(1,a);
    dctx.drawImage(stamps[kind],sx-rr,sy-rr,rr*2,rr*2);
    dctx.globalAlpha=1;}catch(e){}
  }
  function draw(){
    if(!on)return;
    const N=24;
    const lo=Math.max(UTOP,anchor-S.depth),hi=Math.min(UBOT,anchor-S.depth+(WIN_DN-WIN_UP));
    if(hi<=lo)return;
    for(let i=0;i<N;i++){
      const ua=lo+(hi-lo)*i/N,ub=lo+(hi-lo)*(i+1)/N;
      const ya=PIN_Y+PXM*ua*(CZ/(CZ-ua)),yb=PIN_Y+PXM*ub*(CZ/(CZ-ub));
      const sMid=CZ/(CZ-(ua+ub)/2);
      const sy=(S.depth+ua-anchor)*PXM*DR,sh=(ub-ua)*PXM*DR;
      if(sh<=0||yb<=ya+0.01)continue;
      try{ctx.drawImage(frontCv(),0,sy,W,sh,LW/2-(LW/2)*sMid,ya,LW*sMid,yb-ya);}catch(e){}
    }
  }
  function gouge(x,d,r,a){ // embossed trench: lit rim toward the sun, shadowed floor
    stamp('lip',x-2.2,d-0.14,r,a*0.55);
    stamp('dark',x+0.8,d+0.05,r,a);
  }
  return{init,reset,tick,stamp,gouge,draw,on:()=>on};
})();
DEF.init();
/* ============================ HUD ============================ */
function hud(){
  el.depth.innerHTML=Math.floor(S.depth)+'<small> m</small>';
  if(S.combo>0){
    el.combo.textContent=S.combo+'×';
    el.combo.style.color=S.combo>=15?'#ff9d3a':S.combo>=9?'#ffd76a':S.combo>=4?'#7fe6ff':'#ffffff';
    el.combo.style.transform='scale('+(1+S.comboPulse*0.35)+')';
  }else{el.combo.textContent='';}
}
/* ============================ INPUT ============================ */
let anchor=null;
function toLogical(e){const r=cv.getBoundingClientRect();return (e.clientX-r.left)/r.width*LW;}
function pdown(e){
  ac();
  if(S.mode==='intro'||S.mode==='dead')return; // overlays handle taps
  e.preventDefault();
  try{cv.setPointerCapture(e.pointerId);}catch(err){}
  anchor=toLogical(e);S.active=false;S.steer=0;
}
function pmove(e){
  if(anchor===null||S.mode!=='play')return;
  e.preventDefault();
  const x=toLogical(e);let dx=x-anchor;
  // rubber-band drag window: anchor follows so reversals respond instantly
  if(dx>C.touchFull){anchor=x-C.touchFull;dx=C.touchFull;}
  if(dx<-C.touchFull){anchor=x+C.touchFull;dx=-C.touchFull;}
  if(Math.abs(dx)<C.touchDZ){S.active=false;S.steer=0;}
  else{S.active=true;S.steer=clamp(dx/C.touchFull,-1,1);}
}
function pup(e){anchor=null;S.active=false;S.steer=0;}
cv.addEventListener('pointerdown',pdown);
cv.addEventListener('pointermove',pmove);
cv.addEventListener('pointerup',pup);
cv.addEventListener('pointercancel',pup);
document.addEventListener('touchmove',e=>{if(!el.tune.classList.contains('show'))e.preventDefault();},{passive:false});
const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;kb();});
window.addEventListener('keyup',e=>{keys[e.key]=false;kb();});
function kb(){
  const l=keys['ArrowLeft']||keys['a']||keys['A'],r=keys['ArrowRight']||keys['d']||keys['D'];
  if(l&&!r){S.active=true;S.steer=-1;}
  else if(r&&!l){S.active=true;S.steer=1;}
  else if(anchor===null){S.active=false;S.steer=0;}
}
/* overlays */
function beginRun(){fresh();if(lastDeathReal)S.speed=17; // retry = rolling push-off
  $('btnRow').style.display='none';
  S.mode='play';el.intro.classList.add('hide');el.results.classList.add('hide');ac();}
el.intro.addEventListener('pointerdown',e=>{e.preventDefault();beginRun();});
el.results.addEventListener('pointerdown',e=>{e.preventDefault();beginRun();});
$('lbWrap').addEventListener('pointerdown',e=>{e.stopPropagation();});
$('lbGo').addEventListener('click',function(){
  const sc=parseInt(this.dataset.score||'0',10);
  if(LB.submit($('lbInit').value,sc)){
    $('lbEntry').style.display='none';lbStatus('sending…');renderBoard();
  }else{ // blacklist bounce
    $('lbInit').value='';$('lbInit').placeholder='NOPE';
  }
});
$('lbInit').addEventListener('input',function(){this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'');});
LB.refresh();LB.drain(); // warm the board and flush any offline submits from last session
/* buttons */
$('bTune').addEventListener('click',()=>el.tune.classList.toggle('show'));
$('bDebug').addEventListener('click',()=>{debugOn=!debugOn;});
$('bSound').addEventListener('click',function(){sndOn=!sndOn;store.setItem('ep_snd',sndOn?'1':'0');this.style.opacity=sndOn?'1':'0.4';});
/* tune sliders */
function slider(id,vid,fn,fmt){const s=$(id),v=$(vid);
  s.addEventListener('input',()=>{const val=parseFloat(s.value);fn(val);v.textContent=fmt?fmt(val):val;});}
slider('sReturn','vReturn',v=>C.returnRate=v*D2R);
slider('sTurn','vTurn',v=>C.turnRate=v*D2R);
slider('sFuel','vFuel',v=>C.flagFuel=v);
slider('sBleed','vBleed',v=>C.bleed=v,v=>v.toFixed(2));
slider('sYeti','vYeti',v=>C.yetiRamp=v,v=>v.toFixed(3));
slider('sObs','vObs',v=>C.obsMax=v);
/* ============================ RESIZE ============================ */
function resize(){
  const r=cv.getBoundingClientRect();
  const dpr=Math.min(2,window.devicePixelRatio||1);
  VW=Math.max(1,Math.round(r.width*dpr));VH=Math.max(1,Math.round(r.height*dpr));
  cv.width=VW;cv.height=VH;SCL=VW/LW;
  stage.style.setProperty('--u',(r.height/LH)+'px');
}
window.addEventListener('resize',resize);
/* ============================ LOOP ============================ */
let last=0,fps=60,paused=false;
document.addEventListener('visibilitychange',()=>{paused=document.hidden;});
// visible error reporter: sandboxed consoles mask details as "Script error"
const errBox=document.createElement('div');
errBox.setAttribute('style','position:absolute;left:2%;right:2%;bottom:2%;z-index:99;display:none;'+
  'background:rgba(120,10,10,.92);color:#fff;font:12px/1.4 monospace;padding:8px 10px;border-radius:8px;'+
  'pointer-events:none;white-space:pre-wrap;word-break:break-all');
stage.appendChild(errBox);
let errN=0;
function reportErr(msg){errN++;errBox.textContent='ERR['+errN+'] '+msg;errBox.style.display='block';}
window.addEventListener('error',e=>reportErr((e.message||e.error||'?')+' @'+(e.lineno||'?')+':'+(e.colno||'?')));
window.addEventListener('unhandledrejection',e=>{reportErr('promise: '+((e.reason&&e.reason.message)||e.reason));if(e.preventDefault)e.preventDefault();});
function frame(now){
  requestAnimationFrame(frame);
  const t=now/1000;let dt=Math.min(MAX_DT,t-last||0.016);last=t;
  if(dt>0)fps=lerp(fps,1/dt,0.05);
  if(paused)return;
  try{update(dt);render();}
  catch(err){reportErr((err&&err.message)+' | '+(((err&&err.stack)||'').split('\n')[1]||'').trim());}
}
fresh();
resize();
requestAnimationFrame(frame);
/* ============================ TEST HOOK ============================ */
window.__EP={
  begin:beginRun,update,render,S:()=>S,C,M:()=>M,fresh,
  arrays:()=>({gates,obs,npcs,balls,markers,smears}),
  _setRecent:a=>{try{store.setItem('ep_recent',JSON.stringify(a));}catch(e){}},
  lb:LB,def:DEF,
  setSteer:v=>{S.active=v!==0;S.steer=clamp(v,-1,1);}
};
